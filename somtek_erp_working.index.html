<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SOMTEK ERP</title>
<link rel="icon" id="favicon-link" href="./icon-192.png">
<link rel="manifest" href="./manifest.json">
<link rel="apple-touch-icon" href="./icon-192.png">
<meta name="theme-color" content="#c6202f">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="TEKFLOW">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500;600&display=swap');

:root{
  --bg:#f4f3f0;
  --panel:#ffffff;
  --panel-2:#f7f6f3;
  --border:#e3e0d9;
  --accent:#c6202f;
  --accent-dim:#c6202f99;
  --accent-2:#1f4491;
  --text:#1c2230;
  --muted:#6b7180;
  --success:#2f8f5b;
  --danger:#c6202f;
  --grid-line:rgba(31,68,145,0.045);
}
*{box-sizing:border-box; margin:0; padding:0;}
body{
  font-family:'IBM Plex Sans', sans-serif;
  background:
    repeating-linear-gradient(0deg, var(--grid-line) 0, var(--grid-line) 1px, transparent 1px, transparent 40px),
    repeating-linear-gradient(90deg, var(--grid-line) 0, var(--grid-line) 1px, transparent 1px, transparent 40px),
    var(--bg);
  color:var(--text);
  min-height:100vh;
  position:relative;
  overflow-x:hidden;
}
h1,h2,h3,.stencil{font-family:'Oswald', sans-serif; text-transform:uppercase; letter-spacing:0.04em;}
.mono{font-family:'IBM Plex Mono', monospace;}
::selection{background:var(--accent); color:#ffffff;}

/* Watermark valve */
.valve-watermark{
  position:fixed; bottom:0; right:0; width:640px; height:640px;
  opacity:0.5; pointer-events:none; z-index:0; mix-blend-mode:multiply;
}
.valve-watermark img{width:100%; height:100%; object-fit:contain; object-position:bottom right;}

#app{position:relative; z-index:1; min-height:100vh;}

/* ---------- LOGIN ---------- */
.login-wrap{
  min-height:100vh; position:relative; display:flex; align-items:center; justify-content:center;
  overflow:hidden; padding:24px;
  background:
    repeating-linear-gradient(0deg, var(--grid-line) 0, var(--grid-line) 1px, transparent 1px, transparent 40px),
    repeating-linear-gradient(90deg, var(--grid-line) 0, var(--grid-line) 1px, transparent 1px, transparent 40px),
    var(--bg);
}
.login-wrap::before, .login-wrap::after{
  content:''; position:absolute; z-index:0; border-radius:50%; pointer-events:none; filter:blur(110px);
}
.login-wrap::before{
  width:520px; height:520px; top:-160px; left:-160px; background:rgba(198,32,47,0.07);
}
.login-wrap::after{
  width:600px; height:600px; bottom:-200px; right:-200px; background:rgba(31,68,145,0.09);
}
.login-card{
  width:480px; max-width:100%; background:var(--panel); box-shadow:0 20px 60px rgba(28,34,48,0.18);
  padding:52px 56px; position:relative; z-index:2; display:flex; flex-direction:column; justify-content:center;
  overflow:hidden; border-top:6px solid var(--accent); border-radius:6px;
  animation:loginCardIn 0.6s cubic-bezier(.2,.8,.3,1);
}
@keyframes loginCardIn{
  from{ opacity:0; transform:translateY(22px); }
  to{ opacity:1; transform:translateY(0); }
}
.login-hero-caption{
  position:absolute; bottom:28px; left:0; right:0; text-align:center; z-index:3; color:var(--muted); font-family:'Oswald',sans-serif;
  text-transform:uppercase; letter-spacing:0.14em; font-size:12.5px; opacity:0.85;
}
@media(max-width:600px){
  .login-card{padding:40px 28px;}
}
.login-logo{width:100%; max-width:320px; margin:0 auto 20px; text-align:center;}
.login-logo img{width:100%; height:auto; display:block; margin:0 auto;}
.login-sub{color:var(--text); font-size:14.5px; font-weight:500; margin-bottom:32px; letter-spacing:0.03em; text-align:center;}
.field{margin-bottom:16px;}
.field label{display:block; font-size:11px; text-transform:uppercase; letter-spacing:0.08em; color:var(--muted); margin-bottom:6px; font-family:'Oswald',sans-serif;}
.field input, .field select{
  width:100%; background:var(--bg); border:1px solid var(--border); color:var(--text);
  padding:11px 12px; font-size:16px; font-family:'IBM Plex Mono', monospace;
}
.field input:focus, .field select:focus{outline:none; border-color:var(--accent-2);}
.field input[readonly]{background:var(--panel-2); color:var(--muted); cursor:not-allowed;}
.btn{
  background:var(--accent); color:#ffffff; border:none; padding:12px 20px; font-family:'Oswald',sans-serif;
  text-transform:uppercase; letter-spacing:0.06em; font-weight:600; font-size:13px; cursor:pointer;
  transition:filter .15s ease;
}
.btn:hover{filter:brightness(1.1);}
.btn-block{width:100%;}
.btn-ghost{background:transparent; border:1px solid var(--border); color:var(--text);}
.btn-ghost:hover{border-color:var(--accent-2);}
.btn-danger{background:var(--danger); color:#fff;}
.btn-sm{padding:6px 12px; font-size:11px;}
.login-error{background:rgba(224,85,90,0.12); border:1px solid var(--danger); color:#ffb4b6; padding:10px 12px; font-size:13px; margin-bottom:16px;}

/* ---------- APP SHELL ---------- */
.shell{display:flex; min-height:100vh;}
.sidebar{
  width:230px; flex-shrink:0; background:var(--panel); border-right:1px solid var(--border);
  display:flex; flex-direction:column; position:sticky; top:0; height:100vh;
}
.sb-brand{padding:18px 20px; border-bottom:1px solid var(--border); display:flex; align-items:center;}
.sb-brand img{width:100%; max-width:170px; height:auto; display:block;}
.sb-loc{padding:16px 20px; border-bottom:1px solid var(--border);}
.sb-loc-label{font-size:10px; color:var(--muted); text-transform:uppercase; letter-spacing:0.1em; margin-bottom:8px; font-family:'Oswald',sans-serif;}
.loc-btn{
  display:block; width:100%; text-align:left; background:transparent; border:1px solid var(--border); color:var(--muted);
  padding:8px 10px; margin-bottom:6px; font-family:'IBM Plex Mono',monospace; font-size:12.5px; cursor:pointer;
}
.loc-btn.active{border-color:var(--accent-2); color:var(--accent-2); background:rgba(31,68,145,0.08);}
.topbar-loc{display:flex; gap:6px;}
.topbar-loc .loc-btn{display:inline-block; width:auto; margin-bottom:0; padding:8px 14px;}
.loc-picker{display:flex; gap:16px; justify-content:center; margin:28px 0 8px;}
.loc-picker-btn{
  flex:1; max-width:180px; background:var(--bg); border:1.5px solid var(--border); cursor:pointer;
  padding:24px 16px; display:flex; flex-direction:column; align-items:center; gap:8px; transition:all .15s ease;
}
.loc-picker-btn:hover{border-color:var(--accent-2); background:rgba(31,68,145,0.06); transform:translateY(-2px); box-shadow:0 8px 20px rgba(28,34,48,0.1);}
.loc-picker-icon{width:56px; height:56px; object-fit:contain; margin-bottom:4px;}
.loc-picker-name{font-family:'Oswald',sans-serif; font-weight:600; font-size:16px; letter-spacing:0.06em; color:var(--text);}
.loc-picker-go{font-size:11px; color:var(--accent-2); text-transform:uppercase; letter-spacing:0.06em; font-family:'Oswald',sans-serif;}
.sb-nav{flex:1; padding:14px 10px; overflow-y:auto;}
.nav-item{
  display:flex; align-items:center; gap:10px; width:100%; text-align:left; background:transparent; border:none;
  color:var(--text); padding:12px 14px; font-family:'Oswald',sans-serif; font-size:14.5px; letter-spacing:0.04em;
  text-transform:uppercase; cursor:pointer; margin-bottom:3px; font-weight:600; border-left:3px solid transparent;
}
.nav-item .ico{font-size:16px;}
.nav-item:hover{color:var(--accent-2); background:var(--panel-2);}
.nav-item.active{color:var(--accent-2); background:rgba(31,68,145,0.09); border-left:3px solid var(--accent-2); font-weight:700;}
.sb-user{padding:16px 20px; border-top:1px solid var(--border);}
.sb-user-name{font-size:13px; font-weight:600;}
.sb-user-role{font-size:11px; color:var(--accent-2); text-transform:uppercase; letter-spacing:0.06em; margin-bottom:10px;}

.main{flex:1; padding:28px 36px; min-width:0;}
.topbar{display:flex; justify-content:space-between; align-items:flex-end; margin-bottom:24px; flex-wrap:wrap; gap:12px;}
.topbar h2{font-size:24px; font-weight:600;}
.topbar .eyebrow{color:var(--accent); font-size:11px; letter-spacing:0.12em; margin-bottom:4px; font-family:'Oswald',sans-serif;}

.panel{background:var(--panel); border:1px solid var(--border); margin-bottom:20px;}
.panel-head{padding:14px 18px; border-bottom:1px solid var(--border); display:flex; justify-content:space-between; align-items:center;}
.panel-head h3{font-size:14px; letter-spacing:0.05em;}
.panel-body{padding:18px; overflow-x:auto;}

.form-grid{display:grid; grid-template-columns:repeat(auto-fit,minmax(160px,1fr)); gap:14px; align-items:end;}

table{width:100%; border-collapse:collapse; font-size:13px;}
thead th{
  text-align:left; font-family:'Oswald',sans-serif; text-transform:uppercase; letter-spacing:0.05em;
  font-size:11px; color:var(--muted); padding:10px 12px; border-bottom:1px solid var(--border);
}
tbody td{padding:10px 12px; border-bottom:1px solid rgba(51,69,92,0.5); font-family:'IBM Plex Mono',monospace; font-size:12.5px;}
tbody tr:hover{background:rgba(31,68,145,0.04);}
.empty-row td{color:var(--muted); font-style:italic; text-align:center; padding:24px; font-family:'IBM Plex Sans',sans-serif;}
.totals-row td{font-weight:700; border-top:2px solid var(--text); background:var(--panel-2); font-family:'IBM Plex Mono',monospace; font-size:12px;}
.totals-row td:first-child{font-family:'Oswald',sans-serif; letter-spacing:0.06em;}
.totals-row.totals-purchase td{border-top:2px solid var(--accent); background:rgba(198,32,47,0.07); color:var(--accent);}
.totals-row.totals-sales td{border-top:2px solid var(--success); background:rgba(46,138,86,0.08); color:var(--success);}

.badge{padding:3px 9px; font-size:10.5px; text-transform:uppercase; letter-spacing:0.05em; font-family:'Oswald',sans-serif; border:1px solid;}
.badge-pending{color:#e0a955; border-color:#e0a955;}
.badge-transit{color:var(--accent-2); border-color:var(--accent-2);}
.badge-delivered{color:var(--success); border-color:var(--success);}

.stat-row{display:grid; grid-template-columns:repeat(auto-fit,minmax(160px,1fr)); gap:14px; margin-bottom:24px;}
.stat-card{background:var(--panel); border:1px solid var(--border); padding:16px 18px; border-left:2px solid var(--accent);}
.stat-card-purchase{border-left:3px solid var(--accent);}
.stat-card-purchase .val{color:var(--accent);}
.stat-card-sales{border-left:3px solid var(--success);}
.stat-card-sales .val{color:var(--success);}
.stat-card-top{display:flex; align-items:flex-start; justify-content:space-between; gap:10px;}
.stat-ico{font-size:20px; line-height:1; opacity:0.5; flex-shrink:0;}
.stat-card .val{font-family:'Oswald',sans-serif; font-size:28px; font-weight:600;}
.stat-card .lbl{font-size:11px; color:var(--muted); text-transform:uppercase; letter-spacing:0.06em; margin-top:4px;}

/* ---------- BI-STYLE COLORED KPI BLOCKS ---------- */
.kpi-block{padding:18px 20px; box-shadow:0 1px 3px rgba(28,34,48,0.06); border-left:4px solid; border-radius:2px;}
.kpi-block .lbl{font-size:12.5px; font-weight:700; color:var(--muted); text-transform:uppercase; letter-spacing:0.04em;}
.kpi-block .val{font-family:'Oswald',sans-serif; font-size:28px; font-weight:700; margin-top:8px;}
.kpi-green{background:#eef8f3; border-left-color:#4caf82;}
.kpi-green .val{color:#2f8f5f;}
.kpi-blue{background:#edf4fc; border-left-color:#5a9ee8;}
.kpi-blue .val{color:#3d7dc9;}
.kpi-pink{background:#fbeef1; border-left-color:#e08298;}
.kpi-pink .val{color:#c85c76;}
.kpi-orange{background:#fdf5e7; border-left-color:#e8b563;}
.kpi-orange .val{color:#c9963f;}
.kpi-purple{background:#f2eff9; border-left-color:#a48fdb;}
.kpi-purple .val{color:#8168bd;}

/* ---------- BI SECTION HEADER BARS ---------- */
.bi-section-header{background:#152341; color:#fff; font-family:'Oswald',sans-serif; font-weight:700; letter-spacing:0.04em; font-size:14px; text-transform:uppercase; padding:11px 18px; margin:26px 0 14px;}
.bi-grid{display:grid; grid-template-columns:repeat(auto-fit,minmax(280px,1fr)); gap:16px; margin-bottom:8px;}
.bi-card{background:var(--panel); border:1px solid var(--border); box-shadow:0 1px 4px rgba(28,34,48,0.06); padding:16px 18px;}
.bi-card-title{font-family:'Oswald',sans-serif; text-transform:uppercase; letter-spacing:0.05em; font-size:11.5px; color:var(--muted); font-weight:600; margin-bottom:12px;}
.value-block{background:#edf4fc; color:#3d7dc9; padding:0; display:flex; flex-direction:column; justify-content:space-between; min-height:140px; border-left:4px solid #5a9ee8;}
.value-block.vb-green{background:#eef8f3; color:#2f8f5f; border-left-color:#4caf82;}
.value-block .vb-label{padding:14px 16px 0; font-weight:700; font-size:13px;}
.value-block .vb-value{padding:0 16px 16px; font-family:'IBM Plex Mono',monospace; font-size:20px; font-weight:700;}
.donut-row{display:flex; align-items:center; gap:16px;}
.donut-legend{font-size:12px; font-family:'IBM Plex Sans',sans-serif;}
.donut-legend-item{display:flex; align-items:center; gap:7px; margin-bottom:6px;}
.donut-legend-swatch{width:10px; height:10px; border-radius:50%; flex-shrink:0;}
.donut-legend-label{color:var(--text); font-weight:600;}
.donut-legend-sub{color:var(--muted); font-size:11px;}

.icon-btn{background:transparent; border:1px solid var(--border); color:var(--muted); padding:5px 10px; font-size:11px; cursor:pointer; font-family:'Oswald',sans-serif; letter-spacing:0.04em;}
.icon-btn:hover{border-color:var(--danger); color:var(--danger);}
select.status-select{background:var(--bg); border:1px solid var(--border); color:var(--text); padding:5px 8px; font-family:'IBM Plex Mono',monospace; font-size:11.5px;}

.logout-link{color:var(--muted); font-size:11px; text-transform:uppercase; letter-spacing:0.06em; cursor:pointer; text-decoration:underline; text-underline-offset:3px;}
.logout-link:hover{color:var(--danger);}

/* ---------- TOP-RIGHT LOGIN BADGE ---------- */
.topbar-user{display:flex; align-items:center; gap:10px; background:var(--panel); border:1px solid var(--border); padding:8px 14px 8px 10px; flex-shrink:0;}
.topbar-user .role-icon{
  width:30px; height:30px; border-radius:50%; flex-shrink:0; display:flex; align-items:center; justify-content:center;
  font-size:15px; background:var(--panel-2); border:1px solid var(--border);
}
.topbar-user .role-icon.role-admin{background:var(--accent); border-color:var(--accent);}
.topbar-user .role-icon.role-stores{background:var(--accent-2); border-color:var(--accent-2);}
.topbar-user .role-icon.role-logistics{background:var(--success); border-color:var(--success);}
.topbar-user .role-icon.role-automation{background:#8a5cc7; border-color:#8a5cc7;}
.topbar-user .role-icon.role-enquiry{background:#0f8b8d; border-color:#0f8b8d;}
.topbar-user .info{line-height:1.3;}
.topbar-user .info .u-name{font-size:12.5px; font-weight:600;}
.topbar-user .info .u-role{font-size:10.5px; color:var(--muted); text-transform:uppercase; letter-spacing:0.05em; font-family:'Oswald',sans-serif;}
.topbar-user .logout-link{margin-left:10px; padding-left:10px; border-left:1px solid var(--border);}

/* ---------- EXPORT BUTTON ---------- */
.export-btn{
  background:var(--success); color:#fff; border:none; padding:6px 12px; font-family:'Oswald',sans-serif;
  text-transform:uppercase; letter-spacing:0.05em; font-weight:600; font-size:10.5px; cursor:pointer;
  display:inline-flex; align-items:center; gap:6px; transition:filter .15s ease;
}
.export-btn:hover{filter:brightness(1.1);}
.panel-head-actions{display:flex; align-items:center; gap:10px;}

/* ---------- ICON INPUT FIELDS (login) ---------- */
.icon-field-row{display:flex; align-items:center; gap:10px;}
.icon-field-row .field-ico{font-size:16px; line-height:1; opacity:0.75; flex:0 0 auto;}
.icon-field-row input{flex:1 1 auto;}

/* login fields scoped larger for visibility */
.login-card .field label{font-size:12px; color:var(--text); font-weight:600;}
.login-card .field input{
  padding:14px 14px; font-size:15px; background:#ffffff; border:1.5px solid var(--accent-2);
  box-shadow:0 2px 8px rgba(31,68,145,0.08);
}
.login-card .field input:focus{
  border-color:var(--accent); box-shadow:0 0 0 3px rgba(198,32,47,0.15);
}
.login-card .btn-block{padding:15px 20px; font-size:14px; letter-spacing:0.08em;}
.login-card .field{margin-bottom:20px;}

/* ---------- SUBSECTIONS ---------- */
.subsection-title{
  font-family:'Oswald',sans-serif; text-transform:uppercase; letter-spacing:0.06em; font-size:13px;
  color:var(--accent-2); margin:26px 0 10px; padding-bottom:6px; border-bottom:2px solid var(--accent-2);
}
.subsection-title:first-child{margin-top:0;}
.subsection-title.alt{color:var(--accent); border-bottom-color:var(--accent);}

/* ---------- ADDED-BY TAG ---------- */
.added-by{font-size:10.5px; color:var(--accent-2); font-family:'IBM Plex Sans',sans-serif; white-space:nowrap;}

/* ---------- NAV ICON ---------- */
.nav-item .ico{font-size:14px; width:18px; flex-shrink:0; text-align:center;}

/* ---------- PILL TOGGLE BUTTONS (enquiry sheet) ---------- */
.pill-group{display:flex; gap:6px; flex-wrap:wrap;}
.pill-btn{
  background:var(--bg); border:1px solid var(--border); color:var(--muted);
  padding:6px 13px; font-size:11px; text-transform:uppercase; letter-spacing:0.05em;
  font-family:'Oswald',sans-serif; cursor:pointer; transition:filter .15s ease;
}
.pill-btn:hover{filter:brightness(0.97); border-color:var(--accent-2);}
.pill-btn.active{color:#fff; border-color:transparent;}
.pill-btn.active.pill-yes{background:var(--success);}
.pill-btn.active.pill-no{background:var(--danger);}
.pill-btn.active.pill-nil{background:var(--muted);}
.pill-btn.active.pill-accepted{background:var(--success);}
.pill-btn.active.pill-rejected{background:var(--danger);}
.pill-btn.active.pill-pending{background:#e0a955;}
.pill-btn.active.pill-h{background:var(--danger);}
.pill-btn.active.pill-m{background:#e0a955;}
.pill-btn.active.pill-l{background:var(--accent-2);}
.pill-table{display:flex; gap:4px; flex-wrap:nowrap;}
.pill-table .pill-btn{padding:4px 9px; font-size:10px;}
.table-scroll{overflow-x:auto;}

/* ---------- EDIT MODAL ---------- */
.modal-overlay{
  position:fixed; inset:0; background:rgba(28,34,48,0.55); z-index:100;
  display:flex; align-items:center; justify-content:center; padding:24px;
}
.modal-card{
  background:var(--panel); border:1px solid var(--border); border-top:4px solid var(--accent-2);
  max-width:720px; width:100%; max-height:88vh; overflow-y:auto; box-shadow:0 20px 60px rgba(0,0,0,0.3);
}
.modal-head{padding:16px 20px; border-bottom:1px solid var(--border); display:flex; justify-content:space-between; align-items:center;}
.modal-head h3{font-size:15px; letter-spacing:0.05em;}
.modal-body{padding:20px;}
.modal-actions{padding:16px 20px; border-top:1px solid var(--border); display:flex; gap:10px; justify-content:flex-end;}
.action-cell{display:flex; gap:6px;}
.clickable-row{cursor:pointer;}
.clickable-row:hover{background:rgba(31,68,145,0.09);}

/* ---------- DASHBOARD ANALYTICS (bar charts) ---------- */
.chart-grid{display:grid; grid-template-columns:repeat(auto-fit,minmax(400px,1fr)); gap:18px; margin-bottom:24px;}
.chart-card{background:var(--panel); border:1px solid var(--border); border-left:3px solid var(--accent-2); padding:20px 22px; box-shadow:0 1px 3px rgba(28,34,48,0.05); transition:box-shadow .15s ease; overflow:hidden;}
.chart-card:hover{box-shadow:0 4px 14px rgba(28,34,48,0.09);}
.chart-card-title{font-family:'Oswald',sans-serif; text-transform:uppercase; letter-spacing:0.05em; font-size:13px; font-weight:600; color:var(--text); margin-bottom:18px;}

@media(max-width:820px){
  .shell{flex-direction:column;}
  .sidebar{width:100%; height:auto; position:relative;}
  .sb-nav{display:flex; flex-wrap:nowrap; overflow-x:auto; -webkit-overflow-scrolling:touch; padding:10px 8px; gap:2px;}
  .nav-item{width:auto; flex-shrink:0; white-space:nowrap; margin-bottom:0;}
  .main{padding:16px;}
  .topbar{align-items:flex-start;}
  .topbar h2{font-size:19px;}
  .topbar-loc{flex-wrap:wrap;}
  .topbar-user{padding:6px 10px 6px 8px;}
  .topbar-user .info{display:none;}
  .form-grid{grid-template-columns:1fr 1fr; gap:12px;}
  .stat-row{grid-template-columns:repeat(2,1fr);}
  .bi-grid, .chart-grid{grid-template-columns:1fr;}

  .btn, .export-btn, .icon-btn{padding:12px 16px; font-size:12.5px;}

}

  .form-grid{grid-template-columns:1fr;}
  .stat-row{grid-template-columns:1fr 1fr;}
  .topbar h2{font-size:17px;}
  .login-card{padding:32px 22px;}
  .sb-brand img{max-width:110px;}
  .loc-picker{flex-direction:column; align-items:center;}
  .loc-picker-btn{max-width:100%; width:100%;}
}

/* ============================================================
   SHARED BACKEND (Firebase Firestore, via plain REST calls)
   ------------------------------------------------------------
   This talks to Firestore using plain one-shot HTTPS GET/PATCH
   requests (the REST API) instead of the Firebase JS SDK's persistent
   long-polling "channel" connection. Some mobile carriers/networks
   throttle or break that chatty polling connection even with
   long-polling forced on, which shows up as constant timeouts. Plain
   REST requests look like any normal web page load and get through
   far more reliably. The tradeoff: updates from teammates arrive via
   periodic refresh (every few seconds) instead of instantly.

   >>> REPLACE THIS WITH YOUR OWN FIREBASE PROJECT CONFIG <<<
   1. https://console.firebase.google.com -> Add project (free)
   2. Build -> Firestore Database -> Create database -> Start in test mode
   3. Project settings (gear icon) -> Your apps -> Web (</>) -> Register app
   4. Copy the firebaseConfig object it shows you into FIREBASE_CONFIG below
   5. Firestore Database -> Rules -> allow read, write: if true; (so plain
      REST calls without a signed-in user are permitted)
   ============================================================ */
const FIREBASE_CONFIG = {
  apiKey: "AIzaSyAapUWQ9Mm1Q7bBUDG1avriThBA_YqMYfE",
  authDomain: "somtek-erp.firebaseapp.com",
  projectId: "somtek-erp",
  storageBucket: "somtek-erp.firebasestorage.app",
  messagingSenderId: "103175809343",
  appId: "1:103175809343:web:101ab7fab3f5f8e2630b8a"
};
const APP_COLLECTION = 'somtek_erp';
let firebaseReady = false;
let firebaseLoadError = null;
const FS_TIMEOUT_MS = 8000;
const FS_REST_BASE = 'https://firestore.googleapis.com/v1/projects/' + FIREBASE_CONFIG.projectId + '/databases/(default)/documents/' + APP_COLLECTION + '/';

function withTimeout(promise, ms, label){
  return Promise.race([
    promise,
    new Promise((_, reject) => setTimeout(()=> reject(new Error((label||'operation')+' timed out after '+ms+'ms')), ms))
  ]);
}

async function initFirebase(){
  if(!FIREBASE_CONFIG || FIREBASE_CONFIG.apiKey === 'YOUR_API_KEY'){
    firebaseLoadError = 'Firebase is not configured yet. Open the FIREBASE_CONFIG block near the top of the file and paste in your real project values from the Firebase console.';
    console.error(firebaseLoadError);
    return;
  }
  // REST calls need no SDK load / persistent connection - just mark ready.
  firebaseReady = true;
}

async function fsGet(docId){
  if(!firebaseReady) return null;
  try{
    const res = await withTimeout(
      fetch(FS_REST_BASE + docId, { method:'GET' }),
      FS_TIMEOUT_MS, 'Reading '+docId
    );
    if(res.status === 404) return null;
    if(!res.ok){
      let detail = '';
      try{ const j = await res.json(); detail = (j.error && j.error.message) || ''; }catch(e2){}
      throw new Error('HTTP '+res.status+(detail ? ': '+detail : ''));
    }
    const json = await res.json();
    const raw = json.fields && json.fields.data && json.fields.data.stringValue;
    firebaseLoadError = null;
    return raw ? JSON.parse(raw) : null;
  }catch(e){
    console.error('fsGet failed', docId, e);
    firebaseLoadError = 'DB error (read '+docId+'): '+e.message;
    return null;
  }
}
async function fsSet(docId, data){
  if(!firebaseReady) return false;
  try{
    const body = { fields: { data: { stringValue: JSON.stringify(data) } } };
    const res = await withTimeout(
      fetch(FS_REST_BASE + docId, {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body)
      }),
      FS_TIMEOUT_MS, 'Saving '+docId
    );
    if(!res.ok){
      let detail = '';
      try{ const j = await res.json(); detail = (j.error && j.error.message) || ''; }catch(e2){}
      throw new Error('HTTP '+res.status+(detail ? ': '+detail : ''));
    }
    firebaseLoadError = null;
    return true;
  }catch(e){
    console.error('fsSet failed', docId, e);
    firebaseLoadError = 'DB error (save '+docId+'): '+e.message;
    return false;
  }
}

/* ---- sync: periodically pull updates from other users into the screen ----
   (plain REST has no live "push" listener, so this polls on an interval
   instead - every teammate's edits show up within a few seconds) */
let syncTimer = null;
const SYNC_INTERVAL_MS = 6000;

async function syncTick(){
  if(!firebaseReady || isUserTyping() || !session) return;
  const loc = currentLocation;
  const [locDoc, usersDoc] = await Promise.all([ fsGet('loc_'+loc), fsGet('users') ]);
  let changed = false;
  if(locDoc){ DATA[loc] = ensureShape(locDoc); changed = true; }
  if(usersDoc && Array.isArray(usersDoc.list)){ USERS = usersDoc.list; changed = true; }
  if(changed && currentLocation===loc) render();
}
function startSync(){
  if(syncTimer) return; // already running
  if(!firebaseReady) return;
  syncTimer = setInterval(syncTick, SYNC_INTERVAL_MS);
}
// kept as thin wrappers so existing call sites (boot/switchLocation) still work
function subscribeLocation(loc){ startSync(); }
function subscribeUsers(){ startSync(); }
function unsubscribeAll(){
  if(syncTimer){ clearInterval(syncTimer); syncTimer = null; }
}

async function boot(){
  render(loadingScreen('Initializing TEKFLOW...'));
  try{
    await withTimeout(initFirebase(), FS_TIMEOUT_MS + 2000, 'Firebase startup');
  }catch(e){
    console.error('initFirebase overall timeout', e);
    firebaseLoadError = firebaseLoadError || 'Startup timed out reaching the database. Working offline.';
  }
  try{
    await withTimeout(loadAll(), FS_TIMEOUT_MS + 3000, 'Loading data');
  }catch(e){
    console.error('loadAll overall timeout', e);
    firebaseLoadError = firebaseLoadError || 'Startup timed out loading data. Working offline.';
    if(!Array.isArray(USERS) || USERS.length===0) USERS = DEFAULT_USERS;
    LOCATIONS.forEach(loc => { if(!DATA[loc]) DATA[loc] = emptyLocationData(); });
  }
  const savedSession = readSessionLocal();
  if(savedSession){
    const u = USERS.find(u=>u.username===savedSession.username);
    if(u){
      session = {username:u.username, name:u.name, role:u.role};
      currentTab = ROLE_TABS[session.role][0];
      if(savedSession.location && LOCATIONS.includes(savedSession.location)){
        currentLocation = savedSession.location;
        locationChosen = true;
      }
    }
  }
  render();
  if(session && locationChosen){ subscribeLocation(currentLocation); subscribeUsers(); }
  else if(session){ subscribeUsers(); }
}

let importTargetTable = null;

function triggerImport(table){
  if(!isAdmin()) return;
  importTargetTable = table;
  const input = document.getElementById('import-file-input');
  if(input) input.click();
}

function importBtn(table){
  if(!isAdmin()) return '';
  return `<button type="button" class="export-btn" style="background:var(--accent-2);" onclick="triggerImport('${table}')">&#8593; Import Excel</button>`;
}

function excelCellToDateStr(val){
  if(val==null || val==='') return '';
  if(val instanceof Date){
    return val.toISOString().slice(0,10);
  }
  if(typeof val === 'number' && typeof XLSX !== 'undefined' && XLSX.SSF && XLSX.SSF.parse_date_code){
    const p = XLSX.SSF.parse_date_code(val);
    if(p){ return `${p.y}-${String(p.m).padStart(2,'0')}-${String(p.d).padStart(2,'0')}`; }
  }
  return String(val).trim();
}

function normalizeToOption(val, options){
  const s = String(val==null?'':val).trim();
  if(!s) return '';
  const match = options.find(o=>o.toLowerCase()===s.toLowerCase());
  return match !== undefined ? match : s;
}

async function handleImportFile(e){
  const input = e.target;
  const file = input.files && input.files[0];
  const table = importTargetTable;
  input.value = '';
  importTargetTable = null;
  if(!isAdmin()) return;
  if(!file || !table) return;
  if(typeof XLSX === 'undefined'){ alert('Excel import library failed to load. Check your connection.'); return; }
  const schema = IMPORT_SCHEMAS[table];
  if(!schema){ alert('Import is not available for this table.'); return; }

  try{
    const buf = await file.arrayBuffer();
    const wb = XLSX.read(buf, {type:'array'});
    const sheet = wb.Sheets[wb.SheetNames[0]];
    const rows = XLSX.utils.sheet_to_json(sheet, {header:1, defval:'', raw:true});
    if(!rows.length){ alert('That file has no rows.'); return; }

    const headerRow = rows[0].map(h=>String(h==null?'':h).trim().toLowerCase());
    const headerQueues = {};
    headerRow.forEach((h,idx)=>{
      if(!headerQueues[h]) headerQueues[h] = [];
      headerQueues[h].push(idx);
    });
    const colIndex = {};
    schema.forEach(f=>{
      const key = f.header.toLowerCase();
      const queue = headerQueues[key];
      if(queue && queue.length){ colIndex[f.key] = queue.shift(); }
    });
    const addedByIdx = headerRow.indexOf('added by');
    const matchedCount = Object.keys(colIndex).length;

    if(matchedCount === 0){
      alert('Could not match any columns in that file.\n\nTip: click "Export Excel" on this table first to download a template with the exact column headers expected, fill it in, then import it.');
      return;
    }

    const d = DATA[currentLocation];
    let imported = 0;
    for(let i=1; i<rows.length; i++){
      const row = rows[i];
      if(!row || row.every(c=>c===''||c==null)) continue;
      const record = {id: uid()};
      schema.forEach(f=>{
        const idx = colIndex[f.key];
        let val = idx!==undefined ? row[idx] : '';
        if(f.type==='date'){
          record[f.key] = excelCellToDateStr(val);
        }else if(f.options){
          record[f.key] = normalizeToOption(val, f.options);
        }else{
          record[f.key] = String(val==null?'':val).trim();
        }
      });
      record.addedBy = (addedByIdx!==-1 && row[addedByIdx]) ? String(row[addedByIdx]).trim() : actorName();
      if(table==='outward'){
        const qty = parseFloat(record.qty)||0;
        const unitPrice = parseFloat(record.unitPrice)||0;
        record.totalPrice = (qty && unitPrice) ? (qty*unitPrice) : '';
      }
      if(table==='enquiry' && !record.action) record.action = 'Pending';
      if((table==='purchaseAccounts' || table==='salesAccounts') && !record.paymentStatus) record.paymentStatus = 'Pending';
      d[table].push(record);
      imported++;
    }

    if(imported === 0){ alert('No valid data rows found to import (check that rows below the header are not empty).'); return; }
    await saveLocation(currentLocation);
    render();
    const missed = schema.length - matchedCount;
    alert(`Imported ${imported} row(s).` + (missed>0 ? ` Note: ${missed} column(s) from the template were not found in this file and were left blank.` : ''));
  }catch(err){
    console.error('Import failed', err);
    alert('Import failed: ' + err.message);
  }
}

/* ---------------- SVG BAR CHART HELPERS (dashboard analytics) ---------------- */
function truncateLabel(str, maxChars){
  str = String(str==null?'':str).trim();
  if(str.length <= maxChars) return str;
  return str.slice(0, Math.max(1,maxChars-1)).trim() + '\u2026';
}
function svgBarChart(data, opts){
  opts = opts || {};
  const width = opts.width || 600;
  const barHeight = opts.barHeight || 34;
  const gap = opts.gap || 18;
  const leftPad = opts.leftPad || 172;
  const rightPad = opts.rightPad || 58;
  if(!data || data.length === 0){
    return `<p style="color:var(--muted); font-style:italic; font-size:13px;">No data yet.</p>`;
  }
  const maxVal = Math.max(1, ...data.map(d=>Number(d.value)||0));
  const chartWidth = Math.max(40, width - leftPad - rightPad);
  const height = data.length * (barHeight + gap) + gap;
  const total = data.reduce((a,d)=>a+(Number(d.value)||0),0);
  const gid = 'bc' + uid();
  const maxLabelChars = Math.max(10, Math.floor((leftPad-22)/6.6));

  const gridLines = [0.25, 0.5, 0.75, 1].map(f=>{
    const x = (leftPad + chartWidth*f).toFixed(1);
    return `<line x1="${x}" y1="2" x2="${x}" y2="${height-4}" stroke="var(--border)" stroke-width="1" stroke-dasharray="2,4"/>`;
  }).join('');

  const defs = `<filter id="${gid}-shadow" x="-20%" y="-60%" width="140%" height="220%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="1.5" flood-color="#000" flood-opacity="0.18"/>
    </filter>` + data.map((d,i)=>{
    const color = d.color || 'var(--accent-2)';
    return `<linearGradient id="${gid}-${i}" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="${color}" stop-opacity="0.88"/>
      <stop offset="100%" stop-color="${color}" stop-opacity="1"/>
    </linearGradient>`;
  }).join('');

  const bars = data.map((d,i)=>{
    const y = gap + i*(barHeight+gap);
    const val = Number(d.value)||0;
    const w = maxVal>0 ? (val/maxVal)*chartWidth : 0;
    const barW = val>0 ? Math.max(w,4) : 0;
    const fullLabel = String(d.label==null?'':d.label);
    const shortLabel = truncateLabel(fullLabel, maxLabelChars);
    return `
      <text x="${leftPad-12}" y="${y+barHeight/2+4.5}" text-anchor="end" font-size="13" fill="var(--text)" font-family="'IBM Plex Sans', sans-serif" font-weight="600">${esc(shortLabel)}<title>${esc(fullLabel)}</title></text>
      <rect x="${leftPad}" y="${y}" width="${chartWidth}" height="${barHeight}" fill="var(--panel-2)" rx="5"></rect>
      <rect x="${leftPad}" y="${y}" width="${barW}" height="${barHeight}" fill="url(#${gid}-${i})" rx="5" filter="url(#${gid}-shadow)">
        <animate attributeName="width" from="0" to="${barW}" dur="0.55s" fill="freeze"/>
        <title>${esc(fullLabel)}: ${esc(val)}</title>
      </rect>
      <text x="${leftPad+barW+12}" y="${y+barHeight/2+5}" font-size="14.5" fill="var(--text)" font-family="'IBM Plex Mono', monospace" font-weight="700">${esc(val)}</text>`;
  }).join('');

  const totalFooter = opts.showTotal===false ? '' : `
    <div style="margin-top:14px; padding-top:12px; border-top:1px solid var(--border); display:flex; justify-content:space-between; align-items:center;">
      <span style="font-size:11px; color:var(--muted); text-transform:uppercase; letter-spacing:0.08em; font-family:'Oswald',sans-serif;">Total</span>
      <span class="mono" style="font-size:15px; font-weight:700; color:var(--text);">${esc(total)}</span>
    </div>`;

  return `<svg viewBox="0 0 ${width} ${height}" width="100%" height="${height}" style="overflow:visible; display:block;">
    <defs>${defs}</defs>
    ${gridLines}
    ${bars}
  </svg>${totalFooter}`;
}
function chartCard(title, chartHtml){
  return `<div class="chart-card"><div class="chart-card-title">${esc(title)}</div>${chartHtml}</div>`;
}

/* ---------------- DONUT CHART (BI-style warehouse/category split) ---------------- */
function svgDonutChart(segments, size){
  size = size || 130;
  const thickness = Math.round(size*0.16);
  const total = segments.reduce((a,s)=>a+(Number(s.value)||0),0);
  const cx = size/2, cy = size/2, r = (size - thickness)/2;
  const circumference = 2*Math.PI*r;
  let offset = 0;
  const arcs = segments.filter(s=>(Number(s.value)||0)>0).map(s=>{
    const val = Number(s.value)||0;
    const frac = total>0 ? val/total : 0;
    const dash = Math.max(frac*circumference, frac>0 ? 1.5 : 0);
    const arc = `<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${s.color}" stroke-width="${thickness}"
      stroke-dasharray="${dash} ${circumference-dash}" stroke-dashoffset="${-offset}"
      transform="rotate(-90 ${cx} ${cy})" stroke-linecap="butt"/>`;
    offset += dash;
    return arc;
  }).join('');
  const fmt = (n) => n>=1000 ? (n/1000).toFixed(1)+'K' : String(Math.round(n*10)/10);
  const ring = `<svg viewBox="0 0 ${size} ${size}" width="${size}" height="${size}">
    <circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="var(--panel-2)" stroke-width="${thickness}"/>
    ${arcs}
    <text x="${cx}" y="${cy-3}" text-anchor="middle" font-size="15" font-weight="700" fill="var(--text)" font-family="'Oswald',sans-serif">${esc(fmt(total))}</text>
    <text x="${cx}" y="${cy+13}" text-anchor="middle" font-size="8.5" fill="var(--muted)" font-family="'Oswald',sans-serif" letter-spacing="0.05em">TOTAL</text>
  </svg>`;
  const legend = `<div class="donut-legend">${segments.map(s=>{
    const val = Number(s.value)||0;
    const pct = total>0 ? Math.round((val/total)*100) : 0;
    return `<div class="donut-legend-item"><span class="donut-legend-swatch" style="background:${s.color};"></span><span class="donut-legend-label">${esc(s.label)}</span>&nbsp;<span class="donut-legend-sub">${esc(fmt(val))} (${pct}%)</span></div>`;
  }).join('')}</div>`;
  return `<div class="donut-row">${ring}${legend}</div>`;
}

/* ---------------- MULTI-COLOR HORIZONTAL BAR (BI Top-Product style) ---------------- */
const BI_PALETTE = ['#1fa574','#3d8bef','#e6577a','#f0a530','#8a6fd6','#2fb6c4'];
function multiColorHBarChart(data, opts){
  opts = opts || {};
  const width = opts.width || 480;
  const barHeight = opts.barHeight || 26;
  const gap = opts.gap || 14;
  const leftPad = opts.leftPad || 96;
  const rightPad = opts.rightPad || 60;
  if(!data || data.length===0){
    return `<p style="color:var(--muted); font-style:italic; font-size:13px;">No data yet.</p>`;
  }
  const maxVal = Math.max(1, ...data.map(d=>Number(d.value)||0));
  const chartWidth = Math.max(40, width - leftPad - rightPad);
  const height = data.length*(barHeight+gap)+gap;
  const maxLabelChars = Math.max(8, Math.floor((leftPad-16)/6.4));
  const bars = data.map((d,i)=>{
    const y = gap + i*(barHeight+gap);
    const val = Number(d.value)||0;
    const w = maxVal>0 ? (val/maxVal)*chartWidth : 0;
    const barW = val>0 ? Math.max(w,3) : 0;
    const color = d.color || BI_PALETTE[i % BI_PALETTE.length];
    const fullLabel = String(d.label==null?'':d.label);
    const shortLabel = truncateLabel(fullLabel, maxLabelChars);
    return `
      <text x="${leftPad-10}" y="${y+barHeight/2+4}" text-anchor="end" font-size="11.5" fill="var(--text)" font-family="'IBM Plex Sans', sans-serif" font-weight="600">${esc(shortLabel)}<title>${esc(fullLabel)}</title></text>
      <rect x="${leftPad}" y="${y}" width="${barW}" height="${barHeight}" fill="${color}" rx="3">
        <animate attributeName="width" from="0" to="${barW}" dur="0.5s" fill="freeze"/>
      </rect>
      <text x="${leftPad+barW+8}" y="${y+barHeight/2+4}" font-size="11.5" fill="var(--text)" font-family="'IBM Plex Mono', monospace" font-weight="700">${esc(d.display||val)}</text>`;
  }).join('');
  return `<svg viewBox="0 0 ${width} ${height}" width="100%" height="${height}" style="overflow:visible; display:block;">${bars}</svg>`;
}

/* ---------------- BI-STYLE INVENTORY DASHBOARD SECTION ---------------- */
function renderInventoryBISection(){
  const inv = (DATA[currentLocation] && DATA[currentLocation].inventory) || [];
  const fmtNum = (n) => n.toLocaleString(undefined,{maximumFractionDigits:2});

  const catMap = {};
  inv.forEach(i=>{
    const cat = (i.category||'').trim() || 'Uncategorized';
    if(!catMap[cat]) catMap[cat] = {value:0, qty:0};
    catMap[cat].value += (Number(i.qty)||0)*(Number(i.cost)||0);
    catMap[cat].qty += (Number(i.qty)||0);
  });
  const catEntries = Object.entries(catMap).sort((a,b)=>b[1].value-a[1].value);
  const topCat = catEntries[0];
  const topCatName = topCat ? topCat[0] : 'No category data';

  // Show top 5 categories + "Other" as the donut breakdown for this warehouse
  const topCats = catEntries.slice(0,5);
  const otherCats = catEntries.slice(5);
  const otherValue = otherCats.reduce((a,[,v])=>a+v.value,0);
  const otherQty = otherCats.reduce((a,[,v])=>a+v.qty,0);
  const donutEntries = topCats.map(([name,v],i)=>({name, value:v.value, qty:v.qty, color:BI_PALETTE[i % BI_PALETTE.length]}));
  if(otherValue>0 || otherQty>0) donutEntries.push({name:'Other', value:otherValue, qty:otherQty, color:'#c7ccd6'});

  const valueDonut = svgDonutChart(donutEntries.map(c=>({label:c.name, value:c.value, color:c.color})));
  const unitDonut = svgDonutChart(donutEntries.map(c=>({label:c.name, value:c.qty, color:c.color})));

  const allItems = inv.map(i=>({
    name: i.name || '(unnamed)',
    qty: Number(i.qty)||0,
    value: (Number(i.qty)||0)*(Number(i.cost)||0)
  }));
  const top5Value = allItems.slice().sort((a,b)=>b.value-a.value).slice(0,5)
    .map(i=>({label:i.name, value:i.value, display: fmtNum(i.value)}));
  const top5Unit = allItems.slice().sort((a,b)=>b.qty-a.qty).slice(0,5)
    .map(i=>({label:i.name, value:i.qty}));

  return `
  <div class="bi-section-header">Warehouse Position &mdash; ${esc(currentLocation)}</div>
  <div class="bi-grid">
    <div class="bi-card"><div class="bi-card-title">Inventory Value</div>${valueDonut}</div>
    <div class="bi-card"><div class="bi-card-title">Inventory Unit</div>${unitDonut}</div>
  </div>

  <div class="bi-section-header">Category Position</div>
  <div class="bi-grid">
    <div class="value-block"><div class="vb-label">${esc(topCatName)} &mdash; Value</div><div class="vb-value">${fmtNum(topCat ? topCat[1].value : 0)}</div></div>
    <div class="value-block vb-green"><div class="vb-label">${esc(topCatName)} &mdash; Units</div><div class="vb-value">${fmtNum(topCat ? topCat[1].qty : 0)}</div></div>
  </div>

  <div class="bi-section-header">Top Product</div>
  <div class="bi-grid">
    <div class="bi-card"><div class="bi-card-title">Top 5 Product &mdash; Value</div>${multiColorHBarChart(top5Value)}</div>
    <div class="bi-card"><div class="bi-card-title">Top 5 Product &mdash; Unit</div>${multiColorHBarChart(top5Unit)}</div>
  </div>`;
}

function renderDashboard(){

    const allInv = d.inventory || [];

    cards.push({val:paymentsPending, lbl:'Payments Pending', ico:'&#8987;'});
  }

  let extraPanels = '';
  if(allowedTabs.includes('inventory')){
    extraPanels += `
    <div class="panel"><div class="panel-head"><h3>Item register &mdash; ${locationLabel(currentLocation, 14)}</h3><div class="panel-head-actions">${exportBtn('exportDashboardInventory')}</div></div>
    <div class="panel-body">
    <table><thead><tr><th>Item</th><th>Qty</th><th>Specifications</th><th>Cost</th></tr></thead><tbody>
    ${d.inventory.length===0 ? `<tr class="empty-row"><td colspan="4">No stock recorded yet.</td></tr>` :
      d.inventory.slice(0,8).map(i=>`<tr><td>${esc(i.name)}</td><td>${esc(i.qty)}</td><td>${esc(i.specs)}</td><td>${esc(i.cost)}</td></tr>`).join('')}
    </tbody></table>
    </div></div>`;
  }
  if(allowedTabs.includes('inward')){
    const recentInward = d.inward.slice().reverse().slice(0,8);
    extraPanels += `
    <div class="panel"><div class="panel-head"><h3>Recent inward &mdash; ${locationLabel(currentLocation, 14)}</h3><div class="panel-head-actions">${exportBtn('exportInward')}</div></div>
    <div class="panel-body table-scroll">
    <table><thead><tr><th>Date</th><th>Vendor</th><th>PO Number</th><th>Item</th><th>Item Type</th><th>Qty</th></tr></thead><tbody>
    ${recentInward.length===0 ? `<tr class="empty-row"><td colspan="6">No inward entries yet.</td></tr>` :
      recentInward.map(r=>`<tr><td>${esc(r.date)}</td><td style="font-family:'IBM Plex Sans',sans-serif;">${esc(r.vendor)}</td><td>${esc(r.poNumber)}</td><td style="font-family:'IBM Plex Sans',sans-serif;">${esc(r.item)}</td><td>${esc(r.itemType)}</td><td>${esc(r.qty)}</td></tr>`).join('')}
    </tbody></table>
    </div></div>`;
  }
  if(allowedTabs.includes('enquiry')){
    const PRIORITY_ORDER = {H:0, M:1, L:2, '':3};
    const enq = (d.enquiry || []).slice().sort((a,b)=>{
      const pa = PRIORITY_ORDER[a.priority||''] ?? 3;
      const pb = PRIORITY_ORDER[b.priority||''] ?? 3;
      if(pa !== pb) return pa - pb;
      return (b.date||'').localeCompare(a.date||'');
    }).slice(0,8);
    extraPanels += `
    <div class="panel"><div class="panel-head"><h3>Recent enquiries &mdash; ${locationLabel(currentLocation, 14)} <span style="font-weight:400; text-transform:none; letter-spacing:normal; color:var(--muted); font-size:11px;">(sorted by priority, high first &mdash; click a row for full details)</span></h3><div class="panel-head-actions">${exportBtn('exportEnquiry')}</div></div>
    <div class="panel-body table-scroll">
    <table><thead><tr><th>Date</th><th>E.Num</th><th>Customer</th><th>Region</th><th>Sales Person</th><th>Priority</th><th>Action</th></tr></thead><tbody>
    ${enq.length===0 ? `<tr class="empty-row"><td colspan="7">No enquiries recorded yet.</td></tr>` :
      enq.map(r=>`<tr class="clickable-row" onclick="viewEnquiryFromDashboard('${r.id}')"><td>${esc(r.date)}</td><td>${esc(r.enum)}</td><td style="font-family:'IBM Plex Sans',sans-serif;">${esc(r.customer)}</td><td>${esc(r.region)}</td><td style="font-family:'IBM Plex Sans',sans-serif;">${esc(r.salesPerson)}</td><td>${enquiryPriorityBadge(r.priority)}</td><td>${enquiryActionBadge(r.action)}</td></tr>`).join('')}
    </tbody></table>
    </div></div>`;
  }

  let analyticsCharts = '';
  if(allowedTabs.includes('po')){
    const poData = [
      {label:'Vendor PO', value:d.vendorPO.length, color:'var(--accent-2)'},
      {label:'Customer PO', value:d.customerPO.length, color:'var(--accent)'}
    ];
    analyticsCharts += chartCard('Purchase Orders', svgBarChart(poData));
  }
  if(allowedTabs.includes('inward')){
    const typeMap = {};
    d.inward.forEach(r=>{
      const t = (r.itemType||'').trim() || 'Unspecified';
      typeMap[t] = (typeMap[t]||0) + (Number(r.qty)||0);
    });
    const inwardData = Object.entries(typeMap)
      .sort((a,b)=>b[1]-a[1])
      .slice(0,6)
      .map(([label,value])=>({label, value}));
    analyticsCharts += chartCard('Inward by Item Type', svgBarChart(inwardData));
  }
  if(allowedTabs.includes('logistics')){
    const logisticsData = [
      {label:'Pending', value:d.logistics.filter(l=>l.status==='Pending').length, color:'#e0a955'},
      {label:'In Transit', value:d.logistics.filter(l=>l.status==='In Transit').length, color:'var(--accent-2)'},
      {label:'Delivered', value:d.logistics.filter(l=>l.status==='Delivered').length, color:'var(--success)'}
    ];
    analyticsCharts += chartCard('Shipment Status', svgBarChart(logisticsData));
  }
  if(allowedTabs.includes('automation')){
    const automationData = [
      {label:'Automation Jobs', value:d.automation.length, color:'var(--accent-2)'},
      {label:'Pending Assembly', value:d.pendingAssembly.length, color:'#e0a955'}
    ];
    analyticsCharts += chartCard('Automation Workload', svgBarChart(automationData));
  }
  if(allowedTabs.includes('enquiry')){
    const enq = d.enquiry || [];
    const priorityData = [
      {label:'High', value:enq.filter(e=>e.priority==='H').length, color:'var(--danger)'},
      {label:'Medium', value:enq.filter(e=>e.priority==='M').length, color:'#e0a955'},
      {label:'Low', value:enq.filter(e=>e.priority==='L').length, color:'var(--accent-2)'}
    ];
    analyticsCharts += chartCard('Enquiries by Priority', svgBarChart(priorityData));

    const actionData = [
      {label:'Accepted', value:enq.filter(e=>e.action==='Accepted').length, color:'var(--success)'},
      {label:'Rejected', value:enq.filter(e=>e.action==='Rejected').length, color:'var(--danger)'},
      {label:'Pending', value:enq.filter(e=>!e.action||e.action==='Pending').length, color:'#e0a955'}
    ];
    analyticsCharts += chartCard('Enquiries by Action Status', svgBarChart(actionData));
  }
  if(allowedTabs.includes('accounts')){
    const pa = d.purchaseAccounts || [];
    const sa = d.salesAccounts || [];
    const purchaseTotal = pa.reduce((a,r)=>a+(parseFloat(r.grossTotal)||0),0);
    const salesTotal = sa.reduce((a,r)=>a+(parseFloat(r.invoiceValue)||0),0);
    const accountsData = [
      {label:'Purchase Value', value:purchaseTotal, color:'var(--accent)'},
      {label:'Sales Value', value:salesTotal, color:'var(--success)'}
    ];
    analyticsCharts += chartCard('Purchase vs Sales', svgBarChart(accountsData));

    const paymentStatusData = [
      {label:'Purchase Pending', value:pa.filter(r=>(r.paymentStatus||'Pending')==='Pending').length, color:'#e0a955'},
      {label:'Purchase Received', value:pa.filter(r=>r.paymentStatus==='Received').length, color:'var(--accent)'},
      {label:'Sales Pending', value:sa.filter(r=>(r.paymentStatus||'Pending')==='Pending').length, color:'#e0a955'},
      {label:'Sales Received', value:sa.filter(r=>r.paymentStatus==='Received').length, color:'var(--success)'}
    ];
    analyticsCharts += chartCard('Payment Status', svgBarChart(paymentStatusData));
  }

  const KPI_COLORS = ['kpi-green','kpi-blue','kpi-pink','kpi-orange','kpi-purple'];
  return `
  ${tabHeader(currentLocation, 'Overview')}
  <div class="stat-row">
    ${cards.map((c,idx)=>`<div class="stat-card kpi-block ${KPI_COLORS[idx % KPI_COLORS.length]}"><div class="lbl">${esc(c.lbl)}</div><div class="val">${esc(c.val)}</div></div>`).join('')}
  </div>
  ${allowedTabs.includes('inventory') ? renderInventoryBISection() : ''}
  ${analyticsCharts ? `<div class="subsection-title">Analytics</div><div class="chart-grid">${analyticsCharts}</div>` : ''}
  ${extraPanels}`;
}

function pillColorClass(val){
  const map = {Yes:'pill-yes', No:'pill-no', NIL:'pill-nil', Accepted:'pill-accepted', Rejected:'pill-rejected', Pending:'pill-pending', H:'pill-h', M:'pill-m', L:'pill-l'};
  return map[val] || '';
}
function formSelect(fieldId, options, defaultVal, includeBlank){
  const opts = includeBlank ? ['', ...options] : options;
  return `<select id="${fieldId}">
    ${opts.map(o=>`<option value="${esc(o)}" ${defaultVal===o?'selected':''}>${o===''?'Select':esc(o)}</option>`).join('')}
  </select>`;
}
function enquiryBadge(val){
  if(!val) return '<span class="added-by">&mdash;</span>';
  const cls = pillColorClass(val);
  return cls ? `<span class="pill-btn active ${cls}" style="cursor:default;">${esc(val)}</span>` : esc(val);
}

let editModalState = null;

function findEditRecord(table, id){
  if(table === 'users') return USERS.find(u=>u.username===id);
  const d = DATA[currentLocation];
  return d[table] ? d[table].find(x=>x.id===id) : null;
}

function openEditModal(table, id){
  if((table === 'users' || table === 'purchaseAccounts' || table === 'salesAccounts') && !isAdmin()) return;
  const record = findEditRecord(table, id);
  if(!record) return;
  editModalState = {table, id};
  renderEditModal(record);
}

function closeEditModal(){
  editModalState = null;
  const el = document.getElementById('edit-modal-root');
  if(el) el.remove();
}

function renderEditModal(record){
  const schema = EDIT_SCHEMAS[editModalState.table];
  const fieldsHtml = schema.map(f=>{
    const val = record[f.key]==null ? '' : record[f.key];
    if(f.type==='select'){
      return `<div class="field"><label>${esc(f.label)}</label><select id="edit-f-${f.key}">
        ${f.options.map(o=>`<option value="${esc(o)}" ${val===o?'selected':''}>${o===''?'Select':esc(o)}</option>`).join('')}
      </select></div>`;
    }
    return `<div class="field"><label>${esc(f.label)}</label><input type="${f.type}" id="edit-f-${f.key}" value="${esc(val)}"></div>`;
  }).join('');

  const modalHtml = `
  <div id="edit-modal-root" class="modal-overlay">
    <div class="modal-card">
      <div class="modal-head"><h3>Edit Record</h3><button class="icon-btn" onclick="closeEditModal()">Close</button></div>
      <div class="modal-body"><div class="form-grid">${fieldsHtml}</div></div>
      <div class="modal-actions">
        <button class="btn btn-ghost" onclick="closeEditModal()">Cancel</button>
        <button class="btn" onclick="saveEditModal()">Save Changes</button>
      </div>
    </div>
  </div>`;
  document.body.insertAdjacentHTML('beforeend', modalHtml);
}

async function saveEditModal(){
  if(!editModalState) return;
  const {table, id} = editModalState;
  if((table === 'users' || table === 'purchaseAccounts' || table === 'salesAccounts') && !isAdmin()){ closeEditModal(); return; }
  const schema = EDIT_SCHEMAS[table];
  const record = findEditRecord(table, id);
  if(!record){ closeEditModal(); return; }
  schema.forEach(f=>{
    const el = document.getElementById('edit-f-'+f.key);
    if(!el) return;
    let v = el.value;
    if(typeof v === 'string') v = v.trim();
    record[f.key] = v;
  });
  if(table==='outward'){
    const qty = parseFloat(record.qty)||0;
    const unitPrice = parseFloat(record.unitPrice)||0;
    record.totalPrice = (qty && unitPrice) ? (qty*unitPrice) : '';
  }
  if(table==='enquiry' && !record.action) record.action = 'Pending';
  if(table==='users'){
    await saveUsers();
  } else {
    await saveLocation(currentLocation);
  }
  closeEditModal();
  render();
}

/* ---------------- USERS (admin) ---------------- */
function renderUsers(){
  return `
  ${tabHeader('Access Control', 'Users')}
  <div class="panel"><div class="panel-head"><h3>Add user login</h3></div>
  <div class="panel-body">
  <form onsubmit="return addUser(event)">
    <div class="form-grid">
      <div class="field"><label>Full name</label><input type="text" id="u-name" required></div>
      <div class="field"><label>Username</label><input type="text" id="u-username" required></div>
      <div class="field"><label>Password</label><input type="text" id="u-password" required></div>
      <div class="field"><label>Role</label>
        <select id="u-role">
          <option value="stores">Stores</option>
          <option value="admin">Admin</option>
          <option value="logistics">Logistics</option>
          <option value="automation">Automation</option>
        </select>
      </div>
      <button type="submit" class="btn">Create Login</button>
    </div>
  </form>
  </div></div>
  <div class="panel"><div class="panel-head"><h3>All logins</h3><div class="panel-head-actions">${exportBtn('exportUsers')}</div></div>
  <div class="panel-body">
  <table><thead><tr><th>Name</th><th>Username</th><th>Role</th><th></th></tr></thead><tbody>
  ${USERS.map(u=>`<tr>
    <td style="font-family:'IBM Plex Sans',sans-serif;">${esc(u.name)}</td><td>${esc(u.username)}</td><td>${esc(u.role)}</td>
    <td>${actionCell(editBtn('users', u.username), u.username===session.username ? '' : deleteBtn(`deleteUser('${esc(u.username)}')`))}</td>
  </tr>`).join('')}
  </tbody></table>
  </div></div>`;
}
function exportUsers(){
  const headers = ['Name','Username','Role'];
  const rows = USERS.map(u=>[u.name, u.username, u.role]);
  exportToExcel('Users', headers, rows);
}
async function addUser(e){
  e.preventDefault();
  if(!isAdmin()) return false;
  const username = document.getElementById('u-username').value.trim();
  if(USERS.some(u=>u.username===username)){
    alert('That username already exists.');
    return false;
  }
  USERS.push({
    name: document.getElementById('u-name').value.trim(),
    username: username,
    password: document.getElementById('u-password').value,
    role: document.getElementById('u-role').value
  });
  await saveUsers();
  render();
  return false;
}
async function deleteUser(username){
  if(!isAdmin()) return;
  USERS = USERS.filter(u=>u.username!==username);
  await saveUsers();
  render();
}

/* Logging out on tab/browser close is now handled automatically by
   sessionStorage itself (see saveSessionLocal/clearSessionLocal/
   readSessionLocal above) - no unload event listener needed, and this
   avoids the previous bug where a plain page refresh was mistakenly
   treated the same as closing the tab. */

boot();

/* ---- PWA: install-to-home-screen + basic offline support ----------------
   This only activates if service-worker.js is uploaded to the SAME folder
   as this HTML file on a real web server (https:// or localhost) - service
   workers cannot run from a file:// path or from a data: URI, so this is
   silently skipped otherwise (no error, no effect on the app itself). ---- */
if('serviceWorker' in navigator && (location.protocol === 'https:' || location.hostname === 'localhost')){
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./service-worker.js').catch(() => {
      // service-worker.js not present yet on this host - app still works normally, just without install/offline support
    });
  });
}
