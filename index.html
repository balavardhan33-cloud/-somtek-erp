/* Remember where every scrollable element inside #app is scrolled to, so a
   re-render (auto-sync, recalculation, etc.) does not jump tables back to
   the left / top. Positions are matched by element order, which is stable
   because the same tab re-renders with the same structure. */
function captureScrollPositions(){
  const app = document.getElementById('app');
  if(!app) return [];
  const snap = [];
  const els = app.querySelectorAll('*');
  for(let i=0; i<els.length; i++){
    const el = els[i];
    if(el.scrollLeft || el.scrollTop) snap.push({i: i, left: el.scrollLeft, top: el.scrollTop});
  }
  return snap;
}
function restoreScrollPositions(snap){
  if(!snap || !snap.length) return;
  const app = document.getElementById('app');
  if(!app) return;
  const els = app.querySelectorAll('*');
  snap.forEach(s=>{
    const el = els[s.i];
    if(el){ el.scrollLeft = s.left; el.scrollTop = s.top; }
  });
}

/* ---------------- LOGIN SECURITY: Google Authenticator (TOTP) + lockout ---------------- */
const TOTP_ISSUER = 'SOMTEK ERP';
/* Google Authenticator style asterisk icon (inline SVG) shown next to the code input */
const GA_ICON_SVG = `<svg width="24" height="24" viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
  <line x1="24" y1="24" x2="41" y2="24"   stroke="#4285F4" stroke-width="9" stroke-linecap="round"/>
  <line x1="24" y1="24" x2="32.5" y2="9.3" stroke="#EA4335" stroke-width="9" stroke-linecap="round"/>
  <line x1="24" y1="24" x2="15.5" y2="9.3" stroke="#FBBC05" stroke-width="9" stroke-linecap="round"/>
  <line x1="24" y1="24" x2="7"  y2="24"   stroke="#4285F4" stroke-width="9" stroke-linecap="round"/>
  <line x1="24" y1="24" x2="15.5" y2="38.7" stroke="#34A853" stroke-width="9" stroke-linecap="round"/>
  <line x1="24" y1="24" x2="32.5" y2="38.7" stroke="#34A853" stroke-width="9" stroke-linecap="round"/>
</svg>`;
const MAX_LOGIN_ATTEMPTS = 3;
let loginStage = 'creds';        /* 'creds' | 'totp-setup' | 'totp-verify' | 'forgot-user' | 'forgot-totp' | 'forgot-reset' */
let pendingLoginUser = null;     /* username that passed the password check */
let forgotUser = null;           /* username going through the forgot-password flow */
let loginNotice = '';            /* green success message on the login screen */
let pendingTotpSecret = null;    /* secret being registered during first-time setup */

const B32_ALPH = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ234567';
function b32encode(bytes){
  let bits = '', out = '';
  for(let i=0;i<bytes.length;i++) bits += bytes[i].toString(2).padStart(8,'0');
  for(let i=0;i+5<=bits.length;i+=5) out += B32_ALPH[parseInt(bits.slice(i,i+5),2)];
  const rem = bits.length % 5;
  if(rem) out += B32_ALPH[parseInt(bits.slice(bits.length-rem).padEnd(5,'0'),2)];
  return out;
}
function b32decode(str){
  const clean = String(str||'').toUpperCase().replace(/[^A-Z2-7]/g,'');
  let bits = '';
  for(const c of clean) bits += B32_ALPH.indexOf(c).toString(2).padStart(5,'0');
  const bytes = [];
  for(let i=0;i+8<=bits.length;i+=8) bytes.push(parseInt(bits.slice(i,i+8),2));
  return new Uint8Array(bytes);
}
function generateTotpSecret(){
  const buf = new Uint8Array(20);
  crypto.getRandomValues(buf);
  return b32encode(buf);
}
async function totpCode(secret, stepOffset){
  const key = await crypto.subtle.importKey('raw', b32decode(secret), {name:'HMAC', hash:'SHA-1'}, false, ['sign']);
  const counter = Math.floor(Date.now()/1000/30) + (stepOffset||0);
  const buf = new ArrayBuffer(8);
  new DataView(buf).setUint32(4, counter, false);
  const sig = new Uint8Array(await crypto.subtle.sign('HMAC', key, buf));
  const off = sig[sig.length-1] & 0x0f;
  const code = (((sig[off]&0x7f)<<24) | (sig[off+1]<<16) | (sig[off+2]<<8) | sig[off+3]) % 1000000;
  return String(code).padStart(6,'0');
}
async function verifyTotp(secret, code){
  const c = String(code||'').replace(/\D/g,'');
  if(c.length!==6 || !secret) return false;
  /* accept previous / current / next 30s window to tolerate clock drift */
  for(const o of [0,-1,1]){
    try{ if(await totpCode(secret, o) === c) return true; }catch(e){ console.error('TOTP check failed', e); return false; }
  }
  return false;
}
function totpAuthUri(username, secret){
  return 'otpauth://totp/' + encodeURIComponent(TOTP_ISSUER + ':' + username)
    + '?secret=' + secret + '&issuer=' + encodeURIComponent(TOTP_ISSUER)
    + '&algorithm=SHA1&digits=6&period=30';
}
function renderLoginTotpQr(){
  const el = document.getElementById('totp-qr');
  if(!el || !pendingTotpSecret || !pendingLoginUser) return;
  el.innerHTML = '';
  if(window.QRCode){
    try{
      new QRCode(el, {text: totpAuthUri(pendingLoginUser, pendingTotpSecret), width: 190, height: 190, correctLevel: QRCode.CorrectLevel.M});
      return;
    }catch(e){ console.error('QR render failed', e); }
  }
  el.innerHTML = '<div style="font-size:12px; color:#8a1420; padding:8px;">QR code could not be drawn &mdash; use the setup key below and add it manually in Google Authenticator (choose "Enter a setup key", account type: Time based).</div>';
}
function attemptsLeftMsg(user){
  const left = MAX_LOGIN_ATTEMPTS - (parseInt(user.failedAttempts)||0);
  if(user.blocked || left <= 0) return '';
  return ' ' + left + ' attempt' + (left===1?'':'s') + ' left before this account is blocked.';
}
function blockedMsg(){
  return 'This account is blocked after ' + MAX_LOGIN_ATTEMPTS + ' wrong attempts. Ask an admin to unblock it from the Users tab.';
}
async function recordFailedAttempt(user, why){
  user.failedAttempts = (parseInt(user.failedAttempts)||0) + 1;
  if(user.failedAttempts >= MAX_LOGIN_ATTEMPTS && !user.blocked){
    /* never lock out the last active admin - otherwise nobody could unblock anyone */
    const lastAdmin = user.role==='admin' && !USERS.some(x => x.username!==user.username && x.role==='admin' && !x.blocked);
    if(!lastAdmin){
      user.blocked = true;
      logAudit('AUDIT', 'Account "'+user.username+'" blocked after '+MAX_LOGIN_ATTEMPTS+' wrong login attempts ('+why+')');
    }
  }
  await saveUsers();
}
function resetLoginStage(){
  loginStage = 'creds';
  pendingLoginUser = null;
  pendingTotpSecret = null;
  forgotUser = null;
  loginError = '';
  loginNotice = '';
  render();
}
async function completeLogin(found){
  found.failedAttempts = 0;
  await saveUsers();
  loginStage = 'creds';
  pendingLoginUser = null;
  pendingTotpSecret = null;
  loginError = '';
  session = {username:found.username, name:found.name, role:found.role};
  currentTab = sessionAllowedTabs()[0];
  locationChosen = false;
  saveSessionLocal();
  logAudit('LOGIN', 'Signed in');
  subscribeUsers();
  render();
}
async function confirmTotpSetup(e){
  if(e) e.preventDefault();
  const found = USERS.find(x=>x.username===pendingLoginUser);
  if(!found || !pendingTotpSecret){ resetLoginStage(); return false; }
  const code = (document.getElementById('totp-code')||{}).value || '';
  if(await verifyTotp(pendingTotpSecret, code)){
    found.totpSecret = pendingTotpSecret;
    loginError = '';
    logAudit('AUDIT', 'Google Authenticator registered for "'+found.username+'"');
    await completeLogin(found);
  }else{
    loginError = 'That code did not match. Wait for a fresh code in Google Authenticator and try again.';
    render();
  }
  return false;
}
async function verifyTotpLogin(e){
  if(e) e.preventDefault();
  const found = USERS.find(x=>x.username===pendingLoginUser);
  if(!found){ resetLoginStage(); return false; }
  if(found.blocked){ loginError = blockedMsg(); loginStage='creds'; pendingLoginUser=null; render(); return false; }
  const code = (document.getElementById('totp-code')||{}).value || '';
  if(await verifyTotp(found.totpSecret, code)){
    await completeLogin(found);
  }else{
    await recordFailedAttempt(found, 'wrong authenticator code');
    if(found.blocked){
      loginError = blockedMsg();
      loginStage = 'creds';
      pendingLoginUser = null;
    }else{
      loginError = 'Wrong authenticator code.' + attemptsLeftMsg(found);
    }
    render();
  }
  return false;
}
async function unblockUser(username){
  if(!isAdmin()) return;
  const u = USERS.find(x=>x.username===username);
  if(!u) return;
  if(!confirm('Unblock "'+username+'" and reset their failed attempts?')) return;
  u.blocked = false;
  u.failedAttempts = 0;
  await saveUsers();
  logAudit('USER ADMIN', 'Unblocked account "'+username+'"');
  render();
}
async function resetUserTotp(username){
  if(!isAdmin()) return;
  const u = USERS.find(x=>x.username===username);
  if(!u) return;
  if(!confirm('Reset Google Authenticator for "'+username+'"? They will register a new authenticator (fresh QR code) at their next login. Use this when someone lost or changed their phone.')) return;
  delete u.totpSecret;
  await saveUsers();
  logAudit('USER ADMIN', 'Reset Google Authenticator for "'+username+'"');
  render();
}

/* ---------------- FORGOT PASSWORD ---------------- */
function startForgotPassword(){
  loginStage = 'forgot-user';
  forgotUser = null;
  loginError = '';
  loginNotice = '';
  render();
}
function forgotSubmitUser(e){
  if(e) e.preventDefault();
  const u = (document.getElementById('forgot-user')||{value:''}).value.trim();
  const found = USERS.find(x=>x.username===u);
  if(!found){
    loginError = 'Username not found.';
    render();
    return false;
  }
  if(found.blocked){
    loginError = blockedMsg();
    render();
    return false;
  }
  if(!found.totpSecret){
    loginError = 'This account has not registered Google Authenticator yet, so the password cannot be reset here. Ask an admin to set a new password from the Users tab.';
    render();
    return false;
  }
  forgotUser = found.username;
  loginError = '';
  loginStage = 'forgot-totp';
  render();
  return false;
}
async function forgotVerifyTotp(e){
  if(e) e.preventDefault();
  const found = USERS.find(x=>x.username===forgotUser);
  if(!found){ resetLoginStage(); return false; }
  if(found.blocked){ loginError = blockedMsg(); loginStage='creds'; forgotUser=null; render(); return false; }
  const code = (document.getElementById('forgot-totp-code')||{}).value || '';
  if(await verifyTotp(found.totpSecret, code)){
    loginError = '';
    loginStage = 'forgot-reset';
    render();
  }else{
    await recordFailedAttempt(found, 'wrong authenticator code (forgot password)');
    if(found.blocked){
      loginError = blockedMsg();
      loginStage = 'creds';
      forgotUser = null;
    }else{
      loginError = 'Wrong authenticator code.' + attemptsLeftMsg(found);
    }
    render();
  }
  return false;
}
async function forgotSetPassword(e){
  if(e) e.preventDefault();
  const found = USERS.find(x=>x.username===forgotUser);
  if(!found){ resetLoginStage(); return false; }
  const p1 = (document.getElementById('forgot-new-pass')||{value:''}).value;
  const p2 = (document.getElementById('forgot-confirm-pass')||{value:''}).value;
  if(p1.length < 6){ loginError = 'New password must be at least 6 characters.'; render(); return false; }
  if(p1 !== p2){ loginError = 'Passwords do not match.'; render(); return false; }
  if(p1 === found.password){ loginError = 'New password must be different from the old password.'; render(); return false; }
  found.password = p1;
  found.failedAttempts = 0;
  await saveUsers();
  logAudit('USER ADMIN', 'Password reset via forgot-password for "'+found.username+'"');
  loginStage = 'creds';
  forgotUser = null;
  loginError = '';
  loginNotice = 'Password changed. Sign in with your new password.';
  render();
  return false;
}

/* ---------------- SERVICE WORKER HYGIENE ----------------
   Old service workers on some devices still serve YEARS-old cached copies
   of this app (which contain the user-wipe bug). On every start:
   1. unregister every service worker that is not the current ./sw.js
   2. one-time purge of ALL caches on this device
   3. register the current network-first ./sw.js                     */
(function(){
  if(!('serviceWorker' in navigator)) return;
  navigator.serviceWorker.getRegistrations().then(function(regs){
    regs.forEach(function(reg){
      var w = reg.active || reg.waiting || reg.installing;
      var url = (w && w.scriptURL) || '';
      if(url.indexOf('/sw.js') === -1){
        reg.unregister();
        console.warn('Unregistered outdated service worker:', url);
      }
    });
    try{
      if(window.caches && localStorage.getItem('somtek_sw_purge') !== 'v1'){
        caches.keys().then(function(keys){
          return Promise.all(keys.map(function(k){ return caches.delete(k); }));
        }).then(function(){ try{ localStorage.setItem('somtek_sw_purge','v1'); }catch(e){} });
      }
    }catch(e){}
    navigator.serviceWorker.register('./sw.js').catch(function(){});
  }).catch(function(){});
})();

/* ---------------- FULL BACKUP / RESTORE (admin) ---------------- */
function exportFullBackup(){
  try{
    const payload = {
      app: 'TEKFLOW ERP',
      version: APP_VERSION_LABEL,
      location: currentLocation,
      exportedAt: new Date().toISOString(),
      exportedBy: session ? session.username : '',
      data: DATA[currentLocation]
    };
    const blob = new Blob([JSON.stringify(payload, null, 2)], {type:'application/json'});
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'tekflow_backup_' + currentLocation.replace(/[^a-z0-9]+/gi,'_') + '_' + today() + '.json';
    document.body.appendChild(a); a.click(); a.remove();
    setTimeout(()=>URL.revokeObjectURL(a.href), 5000);
  }catch(e){ alert('Backup failed: ' + e.message); }
}
function importFullBackup(){
  if(!isAdmin()) return;
  const inp = document.createElement('input');
  inp.type = 'file'; inp.accept = '.json,application/json';
  inp.onchange = async () => {
    const file = inp.files && inp.files[0];
    if(!file) return;
    try{
      const text = await file.text();
      const payload = JSON.parse(text);
      const data = payload && payload.data;
      if(!data || typeof data !== 'object' || !Array.isArray(data.inventory)){
        alert('This does not look like a TEKFLOW backup file.'); return;
      }
      const counts = Object.keys(data).filter(k=>Array.isArray(data[k])).map(k=>k+': '+data[k].length).join(', ');
      const from = payload.location ? ' (backup of ' + payload.location + (payload.exportedAt ? ', taken ' + payload.exportedAt.slice(0,10) : '') + ')' : '';
      if(!confirm('Restore this backup into ' + currentLocation + '?' + from + '\n\nThis REPLACES all current ' + currentLocation + ' data with:\n' + counts + '\n\nTip: take a Full Backup of the current data first. Continue?')) return;
      DATA[currentLocation] = data;
      await saveLocation(currentLocation);
      render();
      alert('Backup restored successfully.');
    }catch(e){ alert('Restore failed: ' + e.message); }
  };
  inp.click();
}

/* Downscale an image so profile pictures stay small - a bloated users
   document is slow to read and was the trigger of the earlier user-wipe. */
function resizeImageToDataUrl(file, maxDim, cb){
  const reader = new FileReader();
  reader.onload = e => {
    const img = new Image();
    img.onload = () => {
      const scale = Math.min(1, maxDim / Math.max(img.width, img.height));
      const canvas = document.createElement('canvas');
      canvas.width = Math.round(img.width * scale);
      canvas.height = Math.round(img.height * scale);
      canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
      cb(canvas.toDataURL('image/jpeg', 0.85));
    };
    img.onerror = () => cb(null);
    img.src = e.target.result;
  };
  reader.onerror = () => cb(null);
  reader.readAsDataURL(file);
}

async function submitChangePassword(){
  if(!session) return;
  const me = USERS.find(x=>x.username===session.username);
  if(!me){ cpError('Your account could not be found. Sign in again.'); return; }
  const cur = (document.getElementById('cp-current')||{value:''}).value;
  const p1 = (document.getElementById('cp-new')||{value:''}).value;
  const p2 = (document.getElementById('cp-confirm')||{value:''}).value;
  if(cur !== me.password){ cpError('Current password is incorrect.'); return; }
  if(p1.length < 6){ cpError('New password must be at least 6 characters.'); return; }
  if(p1 === cur){ cpError('New password must be different from the current password.'); return; }
  if(p1 !== p2){ cpError('New passwords do not match.'); return; }
  me.password = p1;
  await saveUsers();
  logAudit('USER ADMIN', 'Password changed by "'+me.username+'" (change password)');

  alert('Password changed successfully. Use the new password at your next sign in.');
}

async function handleLogin(e){
  e.preventDefault();
  loginNotice = '';
  const u = document.getElementById('login-user').value.trim();
  const p = document.getElementById('login-pass').value;
  const found = USERS.find(x=>x.username===u);
  if(found && found.blocked){
    loginError = blockedMsg();
    render();
    return false;
  }
  if(!found || found.password !== p){
    if(found){
      await recordFailedAttempt(found, 'wrong password');
      loginError = found.blocked ? blockedMsg() : ('Incorrect username or password.' + attemptsLeftMsg(found));
    }else{
      loginError = 'Incorrect username or password.';
    }
    render();
    return false;
  }
  /* password OK -> Google Authenticator step */
  loginError = '';
  pendingLoginUser = found.username;
  if(!found.totpSecret){
    pendingTotpSecret = generateTotpSecret();   /* first login: register the app once */
    loginStage = 'totp-setup';
  }else{
    loginStage = 'totp-verify';                 /* every next login: ask for the code */
  }
  render();
  return false;
}

/* True when any form on screen has values the user typed but hasn't submitted yet.
   Background sync must never re-render (and wipe the form) in that state. */
function hasUnsavedFormInput(){
  try{
    if(typeof editModalState !== 'undefined' && editModalState) return true;
    const inputs = document.querySelectorAll('#app form input, #app form textarea');
    for(const el of inputs){
      if(el.type==='checkbox' || el.type==='radio'){
        if(el.checked !== el.defaultChecked) return true;
      } else if(el.value !== el.defaultValue){
        return true;
      }
    }
    const sels = document.querySelectorAll('#app form select');
    for(const el of sels){
      const opts = [...el.options];
      let defIdx = opts.findIndex(o=>o.defaultSelected);
      if(defIdx === -1) defIdx = 0;
      if(el.selectedIndex !== defIdx) return true;
    }
  }catch(e){}
  return false;
}

function exportToExcel(filename, headers, rows){
  try{
    if(typeof XLSX === 'undefined'){ alert('Excel export library failed to load. Check your connection.'); return; }
    const data = [headers, ...rows];
    const ws = XLSX.utils.aoa_to_sheet(data);
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, 'Sheet1');
    XLSX.writeFile(wb, filename.replace(/[^a-z0-9_\-]+/gi,'_') + '.xlsx');
  }catch(e){ console.error('export failed', e); alert('Export failed: ' + e.message); }
}

let importTargetTable = null;

function triggerImport(table){
  if(!isAdmin()) return;
  importTargetTable = table;
  const input = document.getElementById('import-file-input');
  if(input) input.click();
}

function importBtn(table){
  if(!isAdmin()) return '';
  return `<button type="button" class="export-btn" style="background:var(--accent-2);" onclick="triggerImport('${table}')">&#8593; Import Excel</button>`;
}

function excelCellToDateStr(val){
  if(val==null || val==='') return '';
  if(val instanceof Date){
    return val.toISOString().slice(0,10);
  }
  if(typeof val === 'number' && typeof XLSX !== 'undefined' && XLSX.SSF && XLSX.SSF.parse_date_code){
    const p = XLSX.SSF.parse_date_code(val);
    if(p){ return `${p.y}-${String(p.m).padStart(2,'0')}-${String(p.d).padStart(2,'0')}`; }
  }
  return String(val).trim();
}

function normalizeToOption(val, options){
  const s = String(val==null?'':val).trim();
  if(!s) return '';
  const match = options.find(o=>o.toLowerCase()===s.toLowerCase());
  return match !== undefined ? match : s;
}

async function handleImportFile(e){
  const input = e.target;
  const file = input.files && input.files[0];
  const table = importTargetTable;
  input.value = '';
  importTargetTable = null;
  if(!isAdmin()) return;
  if(!file || !table) return;
  if(typeof XLSX === 'undefined'){ alert('Excel import library failed to load. Check your connection.'); return; }
  if(table === 'users'){ await importUsersFile(file); return; }
  const schema = IMPORT_SCHEMAS[table];
  if(!schema){ alert('Import is not available for this table.'); return; }

  try{
    const buf = await file.arrayBuffer();
    const wb = XLSX.read(buf, {type:'array'});
    const sheet = wb.Sheets[wb.SheetNames[0]];
    const rows = XLSX.utils.sheet_to_json(sheet, {header:1, defval:'', raw:true});
    if(!rows.length){ alert('That file has no rows.'); return; }

    const headerRow = rows[0].map(h=>String(h==null?'':h).trim().toLowerCase());
    const headerQueues = {};
    headerRow.forEach((h,idx)=>{
      if(!headerQueues[h]) headerQueues[h] = [];
      headerQueues[h].push(idx);
    });
    const colIndex = {};
    schema.forEach(f=>{
      const key = f.header.toLowerCase();
      const queue = headerQueues[key];
      if(queue && queue.length){ colIndex[f.key] = queue.shift(); }
    });
    const addedByIdx = headerRow.indexOf('added by');
    const matchedCount = Object.keys(colIndex).length;

    if(matchedCount === 0){
      alert('Could not match any columns in that file.\n\nTip: click "Export Excel" on this table first to download a template with the exact column headers expected, fill it in, then import it.');
      return;
    }

    const d = DATA[currentLocation];
    let imported = 0;
    for(let i=1; i<rows.length; i++){
      const row = rows[i];
      if(!row || row.every(c=>c===''||c==null)) continue;
      const record = {id: uid()};
      schema.forEach(f=>{
        const idx = colIndex[f.key];
        let val = idx!==undefined ? row[idx] : '';
        if(f.type==='date'){
          record[f.key] = excelCellToDateStr(val);
        }else if(f.options){
          record[f.key] = normalizeToOption(val, f.options);
        }else{
          record[f.key] = String(val==null?'':val).trim();
        }
      });
      record.addedBy = (addedByIdx!==-1 && row[addedByIdx]) ? String(row[addedByIdx]).trim() : actorName();
      if(table==='outward'){
        const qty = parseFloat(record.qty)||0;
        const unitPrice = parseFloat(record.unitPrice)||0;
        record.totalPrice = (qty && unitPrice) ? (qty*unitPrice) : '';
      }
      if(table==='enquiry' && !record.action) record.action = 'Pending';
      if((table==='purchaseAccounts' || table==='salesAccounts') && !record.paymentStatus) record.paymentStatus = 'Pending';
      d[table].push(record);
      imported++;
    }

    if(imported === 0){ alert('No valid data rows found to import (check that rows below the header are not empty).'); return; }
    await saveLocation(currentLocation);
    render();
    const missed = schema.length - matchedCount;
    alert(`Imported ${imported} row(s).` + (missed>0 ? ` Note: ${missed} column(s) from the template were not found in this file and were left blank.` : ''));
  }catch(err){
    console.error('Import failed', err);
    alert('Import failed: ' + err.message);
  }
}

/* ---- Users import (admin only). Users live in their own cloud document,
   not in location data, so they need this dedicated importer. -------- */
async function importUsersFile(file){
  if(!isAdmin()) return;
  const DEFAULT_IMPORT_PASSWORD = 'Welcome123';
  try{
    const buf = await file.arrayBuffer();
    const wb = XLSX.read(buf, {type:'array'});
    const sheet = wb.Sheets[wb.SheetNames[0]];
    const rows = XLSX.utils.sheet_to_json(sheet, {header:1, defval:'', raw:true});
    if(!rows.length){ alert('That file has no rows.'); return; }

    const headerRow = rows[0].map(h=>String(h==null?'':h).trim().toLowerCase());
    const col = names => { for(const n of names){ const i = headerRow.indexOf(n); if(i!==-1) return i; } return -1; };
    const cName  = col(['name','full name']);
    const cUser  = col(['username','user name','login']);
    const cPass  = col(['password']);
    const cRole  = col(['role']);
    const cMob   = col(['mobile number','mobile','phone']);
    const cDob   = col(['date of birth','dob']);
    const cAddr  = col(['address']);
    if(cUser === -1){
      alert('Could not find a "Username" column.\n\nTip: click "Export Excel" on this panel first to get the exact column headers (Name, Username, Role, Mobile Number, Date of Birth, Address), add a Password column if you want, fill it in, then import.');
      return;
    }

    const roles = allRoleNames();
    let added = 0, skippedDup = 0, skippedBlank = 0, defaultedPass = 0;
    const seenInFile = {};
    for(let i=1; i<rows.length; i++){
      const row = rows[i];
      if(!row || row.every(c=>c===''||c==null)) continue;
      const username = String(cUser!==-1 ? row[cUser] : '').trim();
      if(!username){ skippedBlank++; continue; }
      if(seenInFile[username] || USERS.some(u=>u.username===username)){ skippedDup++; continue; }
      seenInFile[username] = true;
      let password = String(cPass!==-1 ? row[cPass] : '').trim();
      if(!password){ password = DEFAULT_IMPORT_PASSWORD; defaultedPass++; }
      let role = normalizeToOption(cRole!==-1 ? row[cRole] : '', roles);
      if(!roles.includes(role)) role = 'enquiry';
      USERS.push({
        name: String(cName!==-1 ? row[cName] : '').trim() || username,
        username: username,
        password: password,
        role: role,
        mobile: String(cMob!==-1 ? row[cMob] : '').trim(),
        dob: cDob!==-1 ? excelCellToDateStr(row[cDob]) : '',
        address: String(cAddr!==-1 ? row[cAddr] : '').trim(),
        extraTabs: [],
        deniedTabs: []
      });
      added++;
    }

    if(added === 0){
      alert('No new users imported.' + (skippedDup ? ' ' + skippedDup + ' username(s) already exist.' : '') + (skippedBlank ? ' ' + skippedBlank + ' row(s) had no username.' : ''));
      return;
    }
    await saveUsers();
    logAudit('USER ADMIN', 'Imported ' + added + ' user(s) from Excel');
    render();
    let msg = 'Imported ' + added + ' user(s).';
    if(skippedDup) msg += '\nSkipped ' + skippedDup + ' duplicate username(s).';
    if(skippedBlank) msg += '\nSkipped ' + skippedBlank + ' row(s) with no username.';
    if(defaultedPass) msg += '\n' + defaultedPass + ' user(s) had no password in the file - they were given the default password "' + DEFAULT_IMPORT_PASSWORD + '". Ask them to change it after first sign in (Change password, top right).';
    msg += '\n\nEach new user will register Google Authenticator at their first sign in.';
    alert(msg);
  }catch(err){
    console.error('Users import failed', err);
    alert('Import failed: ' + err.message);
  }
}

/* ---------------- SVG BAR CHART HELPERS (dashboard analytics) ---------------- */
function truncateLabel(str, maxChars){
  str = String(str==null?'':str).trim();
  if(str.length <= maxChars) return str;
  return str.slice(0, Math.max(1,maxChars-1)).trim() + '\u2026';
}
function svgBarChart(data, opts){
  opts = opts || {};
  const width = opts.width || 600;
  const barHeight = opts.barHeight || 34;
  const gap = opts.gap || 18;
  const leftPad = opts.leftPad || 172;
  const rightPad = opts.rightPad || 58;
  if(!data || data.length === 0){
    return `<p style="color:var(--muted); font-style:italic; font-size:13px;">No data yet.</p>`;
  }
  const maxVal = Math.max(1, ...data.map(d=>Number(d.value)||0));
  const chartWidth = Math.max(40, width - leftPad - rightPad);
  const height = data.length * (barHeight + gap) + gap;
  const total = data.reduce((a,d)=>a+(Number(d.value)||0),0);
  const gid = 'bc' + uid();
  const maxLabelChars = Math.max(10, Math.floor((leftPad-22)/6.6));

  const gridLines = [0.25, 0.5, 0.75, 1].map(f=>{
    const x = (leftPad + chartWidth*f).toFixed(1);
    return `<line x1="${x}" y1="2" x2="${x}" y2="${height-4}" stroke="var(--border)" stroke-width="1" stroke-dasharray="2,4"/>`;
  }).join('');

  const defs = `<filter id="${gid}-shadow" x="-20%" y="-60%" width="140%" height="220%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="1.5" flood-color="#000" flood-opacity="0.18"/>
    </filter>` + data.map((d,i)=>{
    const color = d.color || 'var(--accent-2)';
    return `<linearGradient id="${gid}-${i}" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="${color}" stop-opacity="0.88"/>
      <stop offset="100%" stop-color="${color}" stop-opacity="1"/>
    </linearGradient>`;
  }).join('');

  const bars = data.map((d,i)=>{
    const y = gap + i*(barHeight+gap);
    const val = Number(d.value)||0;
    const w = maxVal>0 ? (val/maxVal)*chartWidth : 0;
    const barW = val>0 ? Math.max(w,4) : 0;
    const fullLabel = String(d.label==null?'':d.label);
    const shortLabel = truncateLabel(fullLabel, maxLabelChars);
    return `
      <text x="${leftPad-12}" y="${y+barHeight/2+4.5}" text-anchor="end" font-size="13" fill="var(--text)" font-family="'IBM Plex Sans', sans-serif" font-weight="600">${esc(shortLabel)}<title>${esc(fullLabel)}</title></text>
      <rect x="${leftPad}" y="${y}" width="${chartWidth}" height="${barHeight}" fill="var(--panel-2)" rx="5"></rect>
      <rect x="${leftPad}" y="${y}" width="${barW}" height="${barHeight}" fill="url(#${gid}-${i})" rx="5" filter="url(#${gid}-shadow)">
        <animate attributeName="width" from="0" to="${barW}" dur="0.55s" fill="freeze"/>
        <title>${esc(fullLabel)}: ${esc(val)}</title>
      </rect>
      <text x="${leftPad+barW+12}" y="${y+barHeight/2+5}" font-size="14.5" fill="var(--text)" font-family="'IBM Plex Mono', monospace" font-weight="700">${esc(val)}</text>`;
  }).join('');

  const totalFooter = opts.showTotal===false ? '' : `
    <div style="margin-top:14px; padding-top:12px; border-top:1px solid var(--border); display:flex; justify-content:space-between; align-items:center;">
      <span style="font-size:11px; color:var(--muted); text-transform:uppercase; letter-spacing:0.08em; font-family:'Oswald',sans-serif;">Total</span>
      <span class="mono" style="font-size:15px; font-weight:700; color:var(--text);">${esc(total)}</span>
    </div>`;

  return `<svg viewBox="0 0 ${width} ${height}" width="100%" height="${height}" style="overflow:visible; display:block;">
    <defs>${defs}</defs>
    ${gridLines}
    ${bars}
  </svg>${totalFooter}`;
}
function chartCard(title, chartHtml){
  return `<div class="chart-card"><div class="chart-card-title">${esc(title)}</div>${chartHtml}</div>`;
}

/* ---------------- DONUT CHART (BI-style warehouse/category split) ---------------- */
function svgDonutChart(segments, size){
  size = size || 130;
  const thickness = Math.round(size*0.16);
  const total = segments.reduce((a,s)=>a+(Number(s.value)||0),0);
  const cx = size/2, cy = size/2, r = (size - thickness)/2;
  const circumference = 2*Math.PI*r;
  let offset = 0;
  const arcs = segments.filter(s=>(Number(s.value)||0)>0).map(s=>{
    const val = Number(s.value)||0;
    const frac = total>0 ? val/total : 0;
    const dash = Math.max(frac*circumference, frac>0 ? 1.5 : 0);
    const arc = `<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${s.color}" stroke-width="${thickness}"
      stroke-dasharray="${dash} ${circumference-dash}" stroke-dashoffset="${-offset}"
      transform="rotate(-90 ${cx} ${cy})" stroke-linecap="butt"/>`;
    offset += dash;
    return arc;
  }).join('');
  const fmt = (n) => n>=1000 ? (n/1000).toFixed(1)+'K' : String(Math.round(n*10)/10);
  const ring = `<svg viewBox="0 0 ${size} ${size}" width="${size}" height="${size}">
    <circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="var(--panel-2)" stroke-width="${thickness}"/>
    ${arcs}
    <text x="${cx}" y="${cy-3}" text-anchor="middle" font-size="15" font-weight="700" fill="var(--text)" font-family="'Oswald',sans-serif">${esc(fmt(total))}</text>
    <text x="${cx}" y="${cy+13}" text-anchor="middle" font-size="8.5" fill="var(--muted)" font-family="'Oswald',sans-serif" letter-spacing="0.05em">TOTAL</text>
  </svg>`;
  const legend = `<div class="donut-legend">${segments.map(s=>{
    const val = Number(s.value)||0;
    const pct = total>0 ? Math.round((val/total)*100) : 0;
    return `<div class="donut-legend-item"><span class="donut-legend-swatch" style="background:${s.color};"></span><span class="donut-legend-label">${esc(s.label)}</span>&nbsp;<span class="donut-legend-sub">${esc(fmt(val))} (${pct}%)</span></div>`;
  }).join('')}</div>`;
  return `<div class="donut-row">${ring}${legend}</div>`;
}

/* ---------------- MULTI-COLOR HORIZONTAL BAR (BI Top-Product style) ---------------- */
const BI_PALETTE = ['#1fa574','#3d8bef','#e6577a','#f0a530','#8a6fd6','#2fb6c4'];
function multiColorHBarChart(data, opts){
  opts = opts || {};
  const width = opts.width || 480;
  const barHeight = opts.barHeight || 26;
  const gap = opts.gap || 14;
  const leftPad = opts.leftPad || 96;
  const rightPad = opts.rightPad || 60;
  if(!data || data.length===0){
    return `<p style="color:var(--muted); font-style:italic; font-size:13px;">No data yet.</p>`;
  }
  const maxVal = Math.max(1, ...data.map(d=>Number(d.value)||0));
  const chartWidth = Math.max(40, width - leftPad - rightPad);
  const height = data.length*(barHeight+gap)+gap;
  const maxLabelChars = Math.max(8, Math.floor((leftPad-16)/6.4));
  const bars = data.map((d,i)=>{
    const y = gap + i*(barHeight+gap);
    const val = Number(d.value)||0;
    const w = maxVal>0 ? (val/maxVal)*chartWidth : 0;
    const barW = val>0 ? Math.max(w,3) : 0;
    const color = d.color || BI_PALETTE[i % BI_PALETTE.length];
    const fullLabel = String(d.label==null?'':d.label);
    const shortLabel = truncateLabel(fullLabel, maxLabelChars);
    return `
      <text x="${leftPad-10}" y="${y+barHeight/2+4}" text-anchor="end" font-size="11.5" fill="var(--text)" font-family="'IBM Plex Sans', sans-serif" font-weight="600">${esc(shortLabel)}<title>${esc(fullLabel)}</title></text>
      <rect x="${leftPad}" y="${y}" width="${barW}" height="${barHeight}" fill="${color}" rx="3">
        <animate attributeName="width" from="0" to="${barW}" dur="0.5s" fill="freeze"/>
      </rect>
      <text x="${leftPad+barW+8}" y="${y+barHeight/2+4}" font-size="11.5" fill="var(--text)" font-family="'IBM Plex Mono', monospace" font-weight="700">${esc(d.display||val)}</text>`;
  }).join('');
  return `<svg viewBox="0 0 ${width} ${height}" width="100%" height="${height}" style="overflow:visible; display:block;">${bars}</svg>`;
}

function renderInventoryBISection(){

    catMap[cat].qty += (Number(i.qty)||0);
  });
  const catEntries = Object.entries(catMap).sort((a,b)=>b[1].value-a[1].value);

function recordSummary(r){
  const skip = new Set(['id','addedBy','items','valueInWords','bankDetails']);
  const parts = [];
  for(const k in r){
    if(skip.has(k)) continue;
    const v = r[k];
    if(v == null || typeof v === 'object') continue;
    const s = String(v).trim();
    if(s){ parts.push(s); if(parts.length >= 5) break; }
  }
  return parts.join(' &middot; ').slice(0, 120);
}
function closeGlobalSearch(){

function runGlobalSearch(qRaw){
  const box = document.getElementById('gs-results');
  if(!box) return;
  const q = String(qRaw||'').trim().toLowerCase();
  if(q.length < 2){ box.innerHTML = '<div style="color:var(--muted); font-size:12px; padding:6px 2px;">Type at least 2 characters to search every tab of ' + esc(currentLocation) + '.</div>'; return; }
  const d = DATA[currentLocation] || {};
  const results = [];
  for(const cfg of GLOBAL_SEARCH_TABLES){
    if(!canSeeTab(cfg.tab)) continue;
    const rows = d[cfg.table] || [];
    for(const r of rows){
      let hit = false;
      for(const k in r){
        const v = r[k];
        if(v == null || typeof v === 'object') continue;
        if(String(v).toLowerCase().includes(q)){ hit = true; break; }
      }
      if(hit){ results.push({cfg, r}); if(results.length >= 30) break; }
    }
    if(results.length >= 30) break;
  }
  if(!results.length){ box.innerHTML = '<div style="color:var(--muted); font-size:12px; padding:6px 2px;">No matches for "' + esc(qRaw) + '" in ' + esc(currentLocation) + '.</div>'; return; }
  box.innerHTML = results.map((x,i)=>`
    <div onclick="gsGo(${i})" style="padding:10px 12px; border:1px solid var(--border); margin-bottom:6px; cursor:pointer; background:var(--panel-2);"
      onmouseover="this.style.borderColor='var(--accent)'" onmouseout="this.style.borderColor='var(--border)'">
      <div style="font-family:'Oswald',sans-serif; font-size:11px; letter-spacing:0.08em; text-transform:uppercase; color:var(--accent); margin-bottom:3px;">${x.cfg.label}</div>
      <div style="font-size:12.5px; color:var(--text);">${recordSummary(x.r) || '(record)'}</div>
    </div>`).join('');
  window._gsResults = results;
  window._gsQuery = qRaw.trim();
}
function gsGo(i){
  const results = window._gsResults || [];
  const x = results[i];
  if(!x) return;
  closeGlobalSearch();
  if(x.cfg.section) x.cfg.section();
  getTableUI(x.cfg.table).search = window._gsQuery || '';
  getTableUI(x.cfg.table).limit = TABLE_PAGE_SIZE;
  pendingSectionLabel = 'Records';
  currentTab = x.cfg.tab;
  render();
}
function applyTabSections(){
  try{
    const main = document.querySelector('#app .main');
    if(!main) return;
    const first = main.querySelector('.sec-head');
    if(!first) return;
    const parent = first.parentElement;
    const kids = [...parent.children];
    const heads = kids.filter(el => el.classList && el.classList.contains('sec-head'));
    if(heads.length < 2) return;
    let idx = -1;
    kids.forEach(ch => {
      if(heads.includes(ch)) idx++;
      if(idx >= 0) ch.setAttribute('data-tabsec', idx);
    });
    const labels = heads.map(h => { const l = h.querySelector('.sec-label'); return l ? l.innerHTML : h.innerHTML; });
    const key = currentTab + '|' + heads.length;
    let active = tabSectionActive[key];
    if(active == null || active < 0 || active >= heads.length) active = 0;
    if(currentTab === 'quotation' && typeof editingQuoteId !== 'undefined' && editingQuoteId) active = 0;
    if(pendingSectionLabel){
      const want = heads.findIndex(h => { const l = h.querySelector('.sec-label'); return l && l.textContent.includes(pendingSectionLabel); });
      if(want >= 0) active = want;
      pendingSectionLabel = null;
    }
    tabSectionActive[key] = active;
    const sw = document.createElement('div');
    sw.className = 'acct-switch tabsec-switch';
    sw.innerHTML = labels.map((l,i)=>`<button type="button" class="acct-switch-btn tabsec-btn ${i===active?'active':''}" data-idx="${i}" onclick="showTabSection('${key}', ${i})">${l}</button>`).join('');
    parent.insertBefore(sw, heads[0]);
    showTabSection(key, active);
  }catch(e){}
}
function showTabSection(key, idx){
  tabSectionActive[key] = idx;
  const main = document.querySelector('#app .main');
  if(!main) return;
  main.querySelectorAll('[data-tabsec]').forEach(el => {
    el.style.display = (el.getAttribute('data-tabsec') === String(idx)) ? '' : 'none';
  });
  main.querySelectorAll('.tabsec-btn').forEach(b => b.classList.toggle('active', Number(b.dataset.idx) === idx));
}

/* ---- Favourite dashboard widgets (starred, saved per user per device) ---- */
function favWidgetsKey(){ return 'somtek_favw_' + (session ? session.username : ''); }
function getFavWidgets(){
  try{ const v = JSON.parse(localStorage.getItem(favWidgetsKey()) || '[]'); return Array.isArray(v) ? v : []; }catch(e){ return []; }
}
function toggleFavWidget(lbl){
  if(!lbl) return;
  let favs = getFavWidgets();
  if(favs.indexOf(lbl) !== -1) favs = favs.filter(x=>x!==lbl);
  else favs.push(lbl);
  try{ localStorage.setItem(favWidgetsKey(), JSON.stringify(favs)); }catch(e){}
  render();
}
function exportDashboardInventory(){
  const d = DATA[currentLocation];
  const headers = ['Item','Qty','Specifications','Cost'];
  const rows = d.inventory.map(i=>[i.name, i.qty, i.specs, i.cost]);
  exportToExcel(currentLocation+'_ItemRegister', headers, rows);
}
function viewEnquiryFromDashboard(id){
  currentTab = 'enquiry';
  render();
  openEditModal('enquiry', id);
}

/* ---------------- PURCHASE ORDER ---------------- */
function poStatusClass(s){ return s==='Executed' ? 'st-executed' : 'st-nonexecuted'; }
function poStatusBadge(s){
  const cls = s==='Executed' ? 'badge-delivered' : 'badge-transit';
  return `<span class="badge ${cls}">${esc(s || 'Non-Executed')}</span>`;
}
function allVendorNames(d){
  const seen = new Set(); const names = [];
  const add = v => { const c = String(v||'').trim(); if(c && !seen.has(c.toLowerCase())){ seen.add(c.toLowerCase()); names.push(c); } };
  (d.inward||[]).forEach(r=>{ add(r.vendor); add(r.paidVendor); });
  (d.vendorPO||[]).forEach(r=>add(r.vendor));
  (d.purchaseAccounts||[]).forEach(r=>{ add(r.supplier); add(r.vendor); });
  (d.enquiry||[]).forEach(r=>add(r.vendor));
  return names.sort((a,b)=>a.localeCompare(b));
}
function allCustomerNames(d){
  const seen = new Set(); const names = [];
  const add = v => { const c = String(v||'').trim(); if(c && !seen.has(c.toLowerCase())){ seen.add(c.toLowerCase()); names.push(c); } };
  (d.customerPO||[]).forEach(r=>add(r.customer));
  (d.salesAccounts||[]).forEach(r=>add(r.customer));
  (d.outward||[]).forEach(r=>add(r.customer));
  (d.sales||[]).forEach(r=>add(r.customer));
  (d.enquiry||[]).forEach(r=>add(r.customer));
  (d.quotations||[]).forEach(r=>add(r.customer));
  return names.sort((a,b)=>a.localeCompare(b));
}
function globalDatalistsHtml(){
  const d = DATA[currentLocation];
  if(!d) return '';
  return `<datalist id="dl-vendors">${allVendorNames(d).map(n=>`<option value="${esc(n)}">`).join('')}</datalist>
  <datalist id="dl-customers">${allCustomerNames(d).map(n=>`<option value="${esc(n)}">`).join('')}</datalist>`;
}
function uniqueCustomerNames(d){
  const names = [];
  const seen = new Set();
  (d.customerPO||[]).forEach(r=>{
    const c = (r.customer||'').trim();
    if(c && !seen.has(c.toLowerCase())){ seen.add(c.toLowerCase()); names.push(c); }
  });
  return names.sort((a,b)=>a.localeCompare(b));
}
function customerAddressLookup(d){
  const map = {};
  (d.customerPO||[]).forEach(r=>{
    const c = (r.customer||'').trim();
    const a = (r.customerAddress||'').trim();
    if(c && a) map[c.toLowerCase()] = a;
  });
  return map;
}
function autofillCpoAddress(){
  const d = DATA[currentLocation];
  const nameEl = document.getElementById('cpo-customer');
  const addrEl = document.getElementById('cpo-address');
  if(!nameEl || !addrEl) return;
  const map = customerAddressLookup(d);
  const match = map[(nameEl.value||'').trim().toLowerCase()];
  if(match) addrEl.value = match;
}

  const d = DATA[currentLocation];
  const r = previewPocDocId ? (d.poContractDocs||[]).find(x=>x.id===previewPocDocId) : null;
  const oldTitle = document.title;
  document.title = r ? ('PO Contract - '+((r.customer&&r.customer[0])||'')) : 'PO Contract Document';

function inwardAgeDays(r){

  if(!t) return null;
  return Math.max(0, Math.floor((Date.now() - t) / 86400000));
}

function updateInLinesTotal(){
  const wrap = document.getElementById('in-item-lines');

  let totalQty = 0, totalValue = 0;
  wrap.querySelectorAll('.in-line').forEach(line=>{

async function addInward(e){
  e.preventDefault();
  const d = DATA[currentLocation];
  const prefix = inwardPoPrefix(currentLocation);
  let poNumber = document.getElementById('in-po-number').value.trim();
  if(poNumber && !poNumber.toUpperCase().startsWith(prefix)){
    poNumber = prefix + '-' + poNumber;
  }
  if(poNumber && d.inward.some(r=>(r.poNumber||'').toLowerCase() === poNumber.toLowerCase())){
    if(!confirm('PO Number "' + poNumber + '" already exists in the Inward log. Add it again anyway?')) return false;
  }
  const paidBy = document.getElementById('in-paid-by').value || 'Paid by us';
  const header = {
    date: document.getElementById('in-date').value,
    vendor: document.getElementById('in-vendor').value.trim(),
    poNumber: poNumber,
    poDate: document.getElementById('in-po-date').value,
    transporter: document.getElementById('in-transporter').value.trim(),
    lrNumber: document.getElementById('in-lr').value.trim(),
    amountPaid: document.getElementById('in-amount-paid').value.trim(),
    paidBy: paidBy,
    paidVendor: paidBy === 'Paid by vendor' ? document.getElementById('in-paid-vendor').value.trim() : ''
  };
  if(paidBy === 'Paid by vendor' && !header.paidVendor){
    alert('You chose "Paid by vendor" - enter the paying vendor name.');
    return false;
  }
  let lines = [...document.querySelectorAll('#in-item-lines .in-line')].map(line => ({
    item: line.querySelector('.in-line-item').value.trim(),
    itemType: line.querySelector('.in-line-type').value.trim(),
    qty: line.querySelector('.in-line-qty').value.trim(),
    price: line.querySelector('.in-line-price').value.trim(),
    deadStock: line.querySelector('.in-line-deadstock').value || 'No'
  })).filter(l => l.item || l.itemType || l.qty || l.price);
  /* item details are optional - a header-only entry is still allowed */
  if(lines.length === 0) lines = [{item:'', itemType:'', qty:'', price:'', deadStock:'No'}];
  for(const l of lines){
    d.inward.push({
      id: uid(),
      date: header.date,
      vendor: header.vendor,
      poNumber: header.poNumber,
      poDate: header.poDate,
      transporter: header.transporter,
      lrNumber: header.lrNumber,
      amountPaid: header.amountPaid,
      paidBy: header.paidBy,
      paidVendor: header.paidVendor,
      item: l.item,
      itemType: l.itemType,
      qty: l.qty,
      price: l.price,
      deadStock: l.deadStock,
      addedBy: actorName()
    });
    /* Auto-add received stock into Inventory */
    const qtyNum = parseFloat(l.qty) || 0;
    if(l.item && qtyNum > 0){
      const existing = d.inventory.find(i => (i.name||'').trim().toLowerCase() === l.item.toLowerCase());
      if(existing){
        existing.qty = String((parseFloat(existing.qty)||0) + qtyNum);
        if(l.price && !existing.cost) existing.cost = l.price;
        if(l.deadStock==='Yes') existing.deadStock = 'Yes';
        existing.lastInwardOn = today();
      } else {
        d.inventory.push({
          id: uid(),
          name: l.item,
          qty: String(qtyNum),
          specs: '',
          cost: l.price,
          category: l.itemType,
          deadStock: l.deadStock,
          addedOn: today(),
          lastInwardOn: today(),
          addedBy: actorName()
        });
      }
    }
  }
  await saveLocation(currentLocation);
  render();
  return false;
}

/* ---- Stock aging: age counted from the last inward receipt of the item,
   or from the day the item record was created. ---- */
function invAgeDays(i){
  /* Age is derived AUTOMATICALLY from the Inward history: the item's most
     recent inward receipt date (matched by item name). Falls back to the
     item's own lastInwardOn / addedOn / Stock Since date. */
  const d = DATA[currentLocation] || {};
  const nm = String(i.name||'').trim().toLowerCase();
  let ts = 0;
  if(nm){
    (d.inward||[]).forEach(r=>{
      if(String(r.item||'').trim().toLowerCase() === nm){
        const t = Date.parse(r.date) || 0;
        if(t > ts) ts = t;
      }
    });
  }
  if(!ts) ts = Date.parse(i.lastInwardOn || i.addedOn || '') || 0;
  if(!ts) return null;
  return Math.max(0, Math.floor((Date.now() - ts) / 86400000));
}
function ageChip(days){
  if(days === null || days === undefined) return '';
  if(days > 365) return '<span class="age-chip age-red">&gt;1 yr</span>';
  if(days > 90) return '<span class="age-chip age-yellow">&gt;90 days</span>';
  return '';
}
function invStampDates(d){
  /* Legacy items have no date - stamp them once so aging starts counting. */
  const t = today();
  (d.inventory||[]).forEach(i=>{ if(!i.addedOn && !i.lastInwardOn) i.addedOn = t; });
}
function isLowStock(i){
  const min = parseFloat(i.minQty);
  const q = parseFloat(i.qty);
  if(isNaN(min) || min <= 0 || isNaN(q)) return false;
  if(i.deadStock === 'Yes') return false;
  return q <= min;
}

async function addOutward(e){
  e.preventDefault();
  const d = DATA[currentLocation];
  const lines = [...document.querySelectorAll('#out-item-lines .out-line')].map(line => ({
    itemId: line.querySelector('.out-line-item').value,
    qty: parseFloat(line.querySelector('.out-line-qty').value) || 0,
    unitPrice: line.querySelector('.out-line-price').value.trim()
  })).filter(l => l.itemId && l.qty > 0);
  if(lines.length === 0){
    alert('Select at least one item and enter its quantity.');
    return false;
  }
  /* Validate total requested per item (handles the same item on two lines) */
  const needed = {};
  for(const l of lines) needed[l.itemId] = (needed[l.itemId]||0) + l.qty;
  for(const itemId in needed){
    const invItem = d.inventory.find(i=>i.id===itemId);
    if(!invItem){ alert('One of the selected items is no longer in inventory. Please re-select.'); return false; }
    const avail = parseFloat(invItem.qty)||0;
    if(needed[itemId] > avail){
      alert('Only ' + avail + ' available in inventory for "' + invItem.name + '" (you asked for ' + needed[itemId] + '). You cannot dispatch more than the available stock.');
      return false;
    }
  }
  const header = {
    date: document.getElementById('out-date').value,
    customer: document.getElementById('out-customer').value.trim(),
    customerPO: document.getElementById('out-po').value.trim(),
    poDate: document.getElementById('out-po-date').value
  };
  for(const l of lines){
    const invItem = d.inventory.find(i=>i.id===l.itemId);
    const unitPrice = parseFloat(l.unitPrice) || 0;
    d.outward.push({
      id: uid(),
      date: header.date,
      customer: header.customer,
      customerPO: header.customerPO,
      poDate: header.poDate,
      item: invItem.name,
      qty: String(l.qty),
      unitPrice: l.unitPrice,
      totalPrice: unitPrice ? (l.qty * unitPrice) : '',
      addedBy: actorName()
    });
    invItem.qty = String(Math.max(0, (parseFloat(invItem.qty)||0) - l.qty));
  }

async function deleteOutward(id){
  if(!isAdmin()) return;
  const d = DATA[currentLocation];
  const rec = d.outward.find(x=>x.id===id);
  /* Return the dispatched quantity back to inventory */
  if(rec && rec.item && (parseFloat(rec.qty)||0) > 0){
    const invItem = d.inventory.find(i => (i.name||'').trim().toLowerCase() === rec.item.trim().toLowerCase());
    if(invItem) invItem.qty = String((parseFloat(invItem.qty)||0) + (parseFloat(rec.qty)||0));

  await saveLocation(currentLocation);
  render();
}

function payModeFieldHtml(prefix, current){
  const opts = ['Credit Period','To Pay','Paid'];
  const cur = String(current||'').trim();
  const isManual = cur && !opts.includes(cur);
  return `
    <select id="${prefix}-paymode" onchange="togglePayModeManual('${prefix}')">
      <option value="" ${!cur?'selected':''}>-- Select --</option>
      ${opts.map(o=>`<option value="${o}" ${cur===o?'selected':''}>${o}</option>`).join('')}
      <option value="__manual__" ${isManual?'selected':''}>Other (manual entry)</option>
    </select>
    <input type="text" id="${prefix}-paymode-manual" placeholder="Type payment mode" value="${esc(isManual?cur:'')}" style="display:${isManual?'block':'none'}; margin-top:6px;">`;
}
function togglePayModeManual(prefix){
  const sel = document.getElementById(prefix+'-paymode');
  const man = document.getElementById(prefix+'-paymode-manual');
  if(!sel || !man) return;
  const show = sel.value === '__manual__';
  man.style.display = show ? 'block' : 'none';
  if(show) man.focus();
}
function readPayMode(prefix){
  const sel = document.getElementById(prefix+'-paymode');
  const man = document.getElementById(prefix+'-paymode-manual');
  if(!sel) return '';
  if(sel.value === '__manual__') return man ? man.value.trim() : '';
  return sel.value;
}

function nextEmpCode(d){
  let max = 0;
  d.employees.forEach(e=>{
    const m = /^EMP-(\d+)$/.exec(String(e.code||''));
    if(m) max = Math.max(max, parseInt(m[1]));
  });
  return 'EMP-' + String(max+1).padStart(4,'0');
}
/* Attendance person picker: HR employees PLUS the login users from the
   Users tab, grouped and de-duplicated by name. */
function hrPersonOptions(selected){
  const d = DATA[currentLocation];
  hrEnsure(d);
  const seen = {};
  const opt = (name, extra) => {
    const key = String(name||'').trim().toLowerCase();
    if(!key || seen[key]) return '';
    seen[key] = true;
    return `<option value="${esc(name)}" ${selected===name?'selected':''}>${esc(name)}${extra?' ('+esc(extra)+')':''}</option>`;
  };
  const empOpts = d.employees.filter(e=>(e.status||'Active')==='Active').map(e=>opt(e.name, e.designation)).join('');
  const userOpts = USERS.map(u=>opt(u.name || u.username, u.role)).join('');
  if(!empOpts && !userOpts) return `<option value="">-- No employees or users yet --</option>`;
  return `<option value="">-- Select person --</option>` +
    (empOpts ? `<optgroup label="Employees">${empOpts}</optgroup>` : '') +
    (userOpts ? `<optgroup label="Login Users (Users tab)">${userOpts}</optgroup>` : '');
}
function hrEmployeeOptions(selected){
  const d = DATA[currentLocation];
  hrEnsure(d);
  const active = d.employees.filter(e=>(e.status||'Active')==='Active');
  if(active.length===0) return `<option value="">-- Add employees first --</option>`;
  return `<option value="">-- Select employee --</option>` +
    active.map(e=>`<option value="${esc(e.name)}" ${selected===e.name?'selected':''}>${esc(e.name)}${e.designation?' ('+esc(e.designation)+')':''}</option>`).join('');
}

let acctSumMonth = '';
function setAcctSumMonth(v){ acctSumMonth = v; render(); }
function monthlySummarySection(d){
  const m = acctSumMonth || today().slice(0,7);
  const inMonth = ds => (ds||'').slice(0,7) === m;
  const num = v => parseFloat(v) || 0;
  const pa = (d.purchaseAccounts||[]).filter(r=>inMonth(r.date));
  const sa = (d.salesAccounts||[]).filter(r=>inMonth(r.date));
  const paTotal = pa.reduce((a,r)=>a+num(r.grossTotal),0);
  const paGst = pa.reduce((a,r)=>a+num(r.cgst)+num(r.sgst)+num(r.igst),0);
  const saTotal = sa.reduce((a,r)=>a+num(r.invoiceValue),0);
  const saGst = sa.reduce((a,r)=>a+num(r.cgst)+num(r.sgst)+num(r.igst),0);
  const saRecv = sa.reduce((a,r)=>a+num(r.amountReceived),0);
  const paPaid = pa.reduce((a,r)=>a+num(r.amountPaid),0);
  const f = n => n.toLocaleString(undefined,{minimumFractionDigits:2, maximumFractionDigits:2});
  const monthName = (()=>{ try{ return new Date(m + '-01T00:00:00').toLocaleDateString(undefined,{month:'long', year:'numeric'}); }catch(e){ return m; } })();
  const card = (lbl, val, sub) => `<div class="stat-card"><div class="stat-card-top"><div class="val" style="font-size:20px;">&#8377; ${f(val)}</div><div class="lbl">${lbl}</div>${sub?`<div style="font-size:11px; color:var(--muted); margin-top:3px;">${sub}</div>`:''}</div></div>`;
  return `
  ${secHead('&#128197;', 'Monthly Summary')}
  <div class="panel"><div class="panel-head"><h3>Month summary <span style="font-weight:400; text-transform:none; letter-spacing:normal; color:var(--muted); font-size:11px;">(for GST filing &amp; review &mdash; based on entry dates in the Accounts registers)</span></h3>
  <div class="panel-head-actions"><input type="month" value="${m}" onchange="setAcctSumMonth(this.value)" style="padding:8px 10px; border:1px solid var(--border); background:var(--panel-2); color:var(--text); font-size:13px;"></div></div>
  <div class="panel-body">
  <div style="font-family:'Oswald',sans-serif; font-size:13px; letter-spacing:0.06em; text-transform:uppercase; color:var(--muted); margin-bottom:12px;">${monthName} &middot; ${pa.length} purchase ${pa.length===1?'entry':'entries'} &middot; ${sa.length} sales ${sa.length===1?'entry':'entries'}</div>
  <div class="stat-grid" style="display:grid; grid-template-columns:repeat(auto-fit, minmax(210px, 1fr)); gap:12px;">
    ${card('Sales (Invoice Value)', saTotal, 'GST collected: &#8377; ' + f(saGst))}
    ${card('Purchases (Gross)', paTotal, 'GST paid: &#8377; ' + f(paGst))}
    ${card('Amount Received', saRecv, 'against sales invoices')}
    ${card('Amount Paid', paPaid, 'against purchase invoices')}
    ${card('Net GST (collected &minus; paid)', saGst - paGst, 'indicative only &mdash; verify with your GST returns')}
  </div>
  </div></div>`;
}

/* Live GST math for the purchase entry form. GST is applied on Basic Value + Freight. */
function paCompute(vals){
  const r2 = n => Math.round(n*100)/100;
  const basic = r2((vals.qty||0) * (vals.unitPrice||0));
  const base = basic + (vals.freight||0);
  const cgst = r2(base * (vals.cgstPct||0) / 100);
  const sgst = r2(base * (vals.sgstPct||0) / 100);
  const igst = r2(base * (vals.igstPct||0) / 100);
  const gross = r2(base + cgst + sgst + igst + (vals.roundOff||0));
  const balance = r2(Math.max(0, gross - (vals.amountPaid||0)));
  return {basic, cgst, sgst, igst, gross, balance};
}
function paRecalc(){
  const gv = id => { const el = document.getElementById(id); return el ? (parseFloat(el.value)||0) : 0; };
  const sv = (id, n) => { const el = document.getElementById(id); if(el) el.value = n ? n.toFixed(2) : ''; };
  const c = paCompute({
    qty: gv('pa-qty'), unitPrice: gv('pa-unitprice'), freight: gv('pa-freight'),
    cgstPct: gv('pa-cgstpct'), sgstPct: gv('pa-sgstpct'), igstPct: gv('pa-igstpct'),
    roundOff: gv('pa-roundoff'), amountPaid: gv('pa-paid')
  });
  sv('pa-taxable', c.basic);
  sv('pa-cgst', c.cgst);
  sv('pa-sgst', c.sgst);
  sv('pa-igst', c.igst);
  sv('pa-gross', c.gross);
  const bal = document.getElementById('pa-balance');
  if(bal) bal.value = c.gross ? c.balance.toFixed(2) : '';
}

/* Due date = entry date + credit period days. Overdue = still Pending after the due date (vs today). */
function purchaseDueInfo(r){
  const days = parseInt(r.creditDays);
  if(!r.date || isNaN(days)) return {dueDate:'', overdue:false};
  const due = new Date(r.date + 'T00:00:00');
  if(isNaN(due.getTime())) return {dueDate:'', overdue:false};
  due.setDate(due.getDate() + days);
  const dueStr = due.getFullYear() + '-' + String(due.getMonth()+1).padStart(2,'0') + '-' + String(due.getDate()).padStart(2,'0');
  const overdue = (r.paymentStatus||'Pending')==='Pending' && today() > dueStr;
  return {dueDate: dueStr, overdue: overdue};
}
/* Same rule for sales: entry turns OVERDUE once Invoice Date + Credit Period passes while Pending */
function salesDueInfo(r){
  const days = parseInt(r.creditDays);
  if(!r.date || isNaN(days)) return {dueDate:'', overdue:false};
  const due = new Date(r.date + 'T00:00:00');
  if(isNaN(due.getTime())) return {dueDate:'', overdue:false};
  due.setDate(due.getDate() + days);
  const dueStr = due.getFullYear() + '-' + String(due.getMonth()+1).padStart(2,'0') + '-' + String(due.getDate()).padStart(2,'0');
  const overdue = (r.paymentStatus||'Pending')==='Pending' && today() > dueStr;
  return {dueDate: dueStr, overdue: overdue};
}
/* Balance Outstanding = Total Invoice Value - Amount Received (always live-computed) */
function salesBalance(r){
  const inv = parseFloat(r.invoiceValue);
  if(isNaN(inv)) return r.balanceOutstanding || '';
  const rec = parseFloat(r.amountReceived)||0;
  return String(Math.round(Math.max(0, inv - rec)*100)/100);
}

  const d = DATA[currentLocation];
  const headers = ['Date','Supplier','Supplier Invoice No.','GSTIN/UIN','P.O Number','P.O Date','Commodity','HSN/SAC','Qty','UOM','Unit Price','BASIC VALUE','Freight','CGST %','CGST','SGST %','SGST','IGST %','IGST','Round Off','Gross Total','AMOUNT PAID','DATE','BALANCE OUTSTANDING','Credit Days','Due Date','Overdue','Payment Status','Remarks','Added By'];

function readSaItemLines(){
  return [...document.querySelectorAll('#sa-item-lines .sa-item-line')].map(line=>{
    const gv = sel => { const el = line.querySelector(sel); return el ? (el.value||'').trim() : ''; };
    const qty = parseFloat(gv('.sa-line-qty'))||0;
    const rate = parseFloat(gv('.sa-line-rate'))||0;
    const amount = Math.round(qty*rate*100)/100;
    return {description: gv('.sa-line-desc'), hsnSac: gv('.sa-line-hsn'), qty: gv('.sa-line-qty'), uom: gv('.sa-line-uom')||'Nos', rate: gv('.sa-line-rate'), amount: amount ? String(amount) : ''};
  }).filter(it => it.description!=='' || it.qty!=='' || it.rate!=='');
}
function saRecalc(){
  const r2 = n => Math.round(n*100)/100;
  let taxable = 0;
  document.querySelectorAll('#sa-item-lines .sa-item-line').forEach(line=>{
    const qty = parseFloat((line.querySelector('.sa-line-qty')||{}).value)||0;
    const rate = parseFloat((line.querySelector('.sa-line-rate')||{}).value)||0;
    const amt = r2(qty*rate);
    const amtEl = line.querySelector('.sa-line-amount');
    if(amtEl) amtEl.value = amt ? amt.toFixed(2) : '';
    taxable += amt;
  });
  taxable = r2(taxable);
  const gv = id => { const el = document.getElementById(id); return el ? (parseFloat(el.value)||0) : 0; };
  const freight = gv('sa-freight');
  const gstBase = r2(taxable + freight); /* GST is applied on Taxable Value + Freight, same as Purchase */
  /* GST amounts are auto-derived from the selected percentage of the Taxable Value */
  [['sa-cgstpct','sa-cgst'],['sa-sgstpct','sa-sgst'],['sa-igstpct','sa-igst']].forEach(pair=>{
    const pEl = document.getElementById(pair[0]);
    const aEl = document.getElementById(pair[1]);
    if(!pEl || !aEl) return;
    const p = parseFloat(pEl.value)||0;
    aEl.value = (p && gstBase) ? r2(gstBase*p/100).toFixed(2) : '';
  });
  const total = r2(taxable + freight + gv('sa-cgst') + gv('sa-sgst') + gv('sa-igst') + gv('sa-cess') + gv('sa-roundoff'));
  const taxEl = document.getElementById('sa-taxable');
  if(taxEl) taxEl.value = taxable ? taxable.toFixed(2) : '';
  const totEl = document.getElementById('sa-invval');
  if(totEl) totEl.value = total ? total.toFixed(2) : '';
  const balEl = document.getElementById('sa-balance');
  if(balEl){
    const bal = r2(Math.max(0, total - gv('sa-received')));
    balEl.value = total ? bal.toFixed(2) : '';
  }
}

/* Entry point from the "Documents" column. Opens the document straight away when
   every required detail is already on the record; otherwise asks for the missing details first. */
function openSalesDoc(id, type, afterMissing){
  const d = DATA[currentLocation];
  const r = (d.salesAccounts||[]).find(x=>x.id===id);
  if(!r) return;
  if(saItems(r).length===0){
    alert('This sales entry has no item lines. Edit the entry and add at least one item before generating documents.');
    return;
  }
  const def = SA_DOC_DEFS[type];
  if(!def) return;
  const missing = def.required.filter(k => String(r[k]==null?'':r[k]).trim()==='');
  if(missing.length===0){
    if(afterMissing==='duplicate'){ openDuplicateInvoiceOptions(id); return; }
    openSalesDocPreview(id, type);
    return;
  }
  openDocPrepModal(r, type, missing, afterMissing);
}
let docPrepState = null;
function openDocPrepModal(r, type, missing, afterMissing){
  closeDocPrep();
  docPrepState = {id: r.id, type: type, afterMissing: afterMissing};
  const def = SA_DOC_DEFS[type];
  const fieldsHtml = def.fields.map(f=>{
    const req = def.required.indexOf(f.key)!==-1;
    const isMissing = missing.indexOf(f.key)!==-1;
    let val = r[f.key]==null ? '' : String(r[f.key]);
    if(val.trim()==='' && f.def!==undefined){ val = (f.def==='BANK') ? defaultBankDetails(currentLocation) : f.def; }
    return `<div class="field"><label>${esc(f.label)}${req?' <span style="color:#e6577a;">*</span>':''}</label>
      <input type="${f.type||'text'}" id="docprep-${f.key}" value="${esc(val)}" ${isMissing?'style="border:1px solid #e6577a;"':''}>
    </div>`;
  }).join('');
  const modalHtml = `
  <div id="docprep-modal-root" class="modal-overlay">
    <div class="modal-card">
      <div class="modal-head"><h3>${esc(def.title)} &mdash; details needed</h3><button class="icon-btn" onclick="closeDocPrep()">Close</button></div>
      <div class="modal-body">
        <p style="margin:0 0 14px 0; font-size:12px; color:var(--muted);">Details below are pre-filled from the sales entry. Fields marked <span style="color:#e6577a;">*</span> are required for this document &mdash; please fill the highlighted ones, then generate.</p>
        <div class="form-grid">${fieldsHtml}</div>
      </div>
      <div class="modal-actions">
        <button class="btn btn-ghost" onclick="closeDocPrep()">Cancel</button>
        <button class="btn" onclick="saveDocPrep()">Save &amp; Generate</button>
      </div>
    </div>
  </div>`;
  document.body.insertAdjacentHTML('beforeend', modalHtml);
}
function closeDocPrep(){
  docPrepState = null;
  const el = document.getElementById('docprep-modal-root');
  if(el) el.remove();
}
async function saveDocPrep(){
  if(!docPrepState) return;
  const d = DATA[currentLocation];
  const r = (d.salesAccounts||[]).find(x=>x.id===docPrepState.id);
  if(!r){ closeDocPrep(); return; }
  const def = SA_DOC_DEFS[docPrepState.type];
  const vals = {};
  def.fields.forEach(f=>{
    const el = document.getElementById('docprep-'+f.key);
    vals[f.key] = el ? (el.value||'').trim() : '';
  });
  const stillMissing = def.required.filter(k => vals[k]==='');
  if(stillMissing.length){
    const labels = stillMissing.map(k => { const f = def.fields.find(x=>x.key===k); return f ? f.label : k; });
    alert('Please fill the required details: ' + labels.join(', '));
    return;
  }
  Object.assign(r, vals);
  const id = r.id, type = docPrepState.type, afterMissing = docPrepState.afterMissing;
  await saveLocation(currentLocation);
  closeDocPrep();
  render();
  if(afterMissing==='duplicate'){ openDuplicateInvoiceOptions(id); return; }
  openSalesDocPreview(id, type);
}
function salesDocHtml(r, type, heading){
  if(type==='dc') return deliveryChallanHtml(r);
  if(type==='packing') return packingListHtml(r);
  return invoiceDocumentHtml(r, heading);
}

let previewInvoiceId = null;
let previewDocType = 'invoice';
let previewInvoiceHeading = null;
function openSalesDocPreview(id, type, heading){
  const d = DATA[currentLocation];
  const r = (d.salesAccounts||[]).find(x=>x.id===id);
  if(!r) return;
  closeQuotePreview();
  previewInvoiceId = id;
  previewDocType = type || 'invoice';
  previewInvoiceHeading = heading || null;
  const overlay = document.createElement('div');
  overlay.id = 'quote-preview';
  overlay.innerHTML = `
    <div class="quote-actions">
      <button type="button" class="btn" onclick="printInvoice()">&#128424; Print / Save as PDF</button>
      <button type="button" class="btn" onclick="sendToPrintStation()" title="Queue this document to print automatically on the office printer PC">&#128444; Send to Printer</button>
      <button type="button" class="btn quote-close-btn" onclick="closeQuotePreview()">&#10005; Close</button>
    </div>
    ${salesDocHtml(r, previewDocType, previewInvoiceHeading)}`;
  document.body.appendChild(overlay);
  const pageStyle = document.createElement('style');
  pageStyle.id = 'quote-page-style';
  pageStyle.textContent = '@page{ size: A4 portrait; margin: 10mm; }';
  document.head.appendChild(pageStyle);
  document.body.classList.add('quote-open');
}
function openInvoicePreview(id){ openSalesDocPreview(id, 'invoice'); }
function salesDocFileName(r, type, heading){
  if(!r) return invoiceCompanyName(currentLocation) + ' Document';
  if(type==='dc') return 'DC-' + (r.dcNo || r.invNo || 'DeliveryChallan');
  if(type==='packing') return 'PackingList-' + (r.dcNo || r.invNo || '');
  const base = r.invNo || 'Invoice';
  if(heading && heading!=='TAX INVOICE' && heading!=='ORIGINAL FOR RECIPIENT') return base + ' - ' + heading;
  if(heading==='ORIGINAL FOR RECIPIENT') return base + ' - ORIGINAL FOR RECIPIENT';
  return base;
}
function printInvoice(){
  const d = DATA[currentLocation];
  const r = previewInvoiceId ? (d.salesAccounts||[]).find(x=>x.id===previewInvoiceId) : null;
  const oldTitle = document.title;
  document.title = salesDocFileName(r, previewDocType, previewInvoiceHeading);
  const restore = () => { document.title = oldTitle; window.removeEventListener('afterprint', restore); };
  window.addEventListener('afterprint', restore);
  window.print();
  setTimeout(restore, 3000);
}
/* ---- Compact "Description of Goods" cell in the sales register ----
   Long multi-item entries show only the first item + a "+N more" link;
   clicking expands the full numbered item list, click again to collapse. */
let saDescExpanded = {};
function toggleSaDesc(id){
  saDescExpanded[id] = !saDescExpanded[id];
  render();
}
function saDescCellHtml(r){
  const descs = saItems(r).map(it=>String(it.description||'').trim()).filter(Boolean);
  if(descs.length===0) return esc(r.description||'');
  const full = descs.join('; ');
  if(saDescExpanded[r.id]){
    return `<div>${descs.map((t,i)=>`<div class="desc-item">${descs.length>1 ? `<b>${i+1}.</b> ` : ''}${esc(t)}</div>`).join('')}</div><span class="desc-toggle" onclick="toggleSaDesc('${r.id}')">&#9650; Show less</span>`;
  }
  const LIMIT = 55;
  const first = descs[0];
  const more = descs.length - 1;
  const needsToggle = more > 0 || first.length > LIMIT;
  const shortHtml = first.length > LIMIT ? (esc(first.slice(0, LIMIT)) + '&hellip;') : esc(first);
  return `<div title="${esc(full)}">${shortHtml}</div>${needsToggle ? `<span class="desc-toggle" onclick="toggleSaDesc('${r.id}')">${more>0 ? '+'+more+' more item'+(more>1?'s':'') : 'Show full'} &#9660;</span>` : ''}`;
}
async function updateSalesPaymentStatus(id, status){
  const d = DATA[currentLocation];
  const r = d.salesAccounts.find(x=>x.id===id);
  if(r){ r.paymentStatus = status; await saveLocation(currentLocation); render(); }
}
async function deleteSalesAccount(id){
  if(!isAdmin()) return;
  const d = DATA[currentLocation];
  d.salesAccounts = d.salesAccounts.filter(x=>x.id!==id);
  await saveLocation(currentLocation);
  render();
}

  const d = DATA[currentLocation];
  const headers = ['INVOICE NO','INVOICE DATE','NAME OF THE CUSTOMER','BILL TO','GST NO.','DC NO.','DC DATE','PO NO','PO DATE','PLACE OF SUPPLY','STATE CODE','CONTACT PERSON','MOBILE NUMBER','DESCRIPTION OF GOODS','HSN/SAC CODE','QTY','UOM','RATE','AMOUNT','TAXABLE VALUE','FREIGHT CHARGES','CGST %','CGST','SGST %','SGST','IGST %','IGST','Cess','ROUND OFF','TOTAL INVOICE VALUE','Value In Words','INSURANCE DETAILS','OUR BANK DETAILS','AMOUNT RECEIVED','PAYMENT DATE','BALANCE OUTSTANDING','CREDIT DAYS','DUE DATE','Payment Status','Added By'];
  const rows = d.salesAccounts.map(r=>[r.invNo, r.date, r.customer, r.billTo, r.gstin, r.dcNo, r.dcDate, r.poNo, r.poDate, r.placeOfSupply, r.stateCode, r.contactPerson, r.contactMobile, (r.description || saItems(r).map(it=>it.description).filter(Boolean).join('; ')), r.hsnSac, r.qty, r.uom, r.rate, r.amount, r.taxable, r.freight, r.cgstPct, r.cgst, r.sgstPct, r.sgst, r.igstPct, r.igst, r.cess, r.roundOff, r.invoiceValue, (r.valueInWords || (r.invoiceValue ? numberToWordsINR(r.invoiceValue) : '')), r.insurance, r.bankDetails, r.amountReceived, r.paymentDate, salesBalance(r), r.creditDays, salesDueInfo(r).dueDate, r.paymentStatus||'Pending', r.addedBy]);
  cfExportAppend('salesAccounts', d.salesAccounts, headers, rows);

}
