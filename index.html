let editModalState = null;

function findEditRecord(table, id){
  if(table === 'users') return USERS.find(u=>u.username===id);
  const d = DATA[currentLocation];
  return d[table] ? d[table].find(x=>x.id===id) : null;
}

function openEditModal(table, id){
  if(table === 'users' && !isAdmin()) return;
  if((table === 'purchaseAccounts' || table === 'salesAccounts') && !canSeeTab('accounts')) return;
  const record = findEditRecord(table, id);
  if(!record) return;
  editModalState = {table, id};
  renderEditModal(record);
}

function closeEditModal(){
  editModalState = null;
  const el = document.getElementById('edit-modal-root');
  if(el) el.remove();
}

/* Item-line editor used inside the salesAccounts edit modal, so items are
   edited one row at a time instead of merged into single flat fields. */
function editItemLineHtml(it){
  it = it || {};
  return `<div class="out-line em-item-line" style="flex-wrap:wrap;">
    <input type="text" class="em-line-desc" placeholder="Description of goods" value="${esc(it.description||'')}" oninput="editItemsRecalc()" style="flex:3 1 220px; min-width:180px; background:var(--bg); border:1px solid var(--border); color:var(--text); padding:9px 10px; font-family:'IBM Plex Sans',sans-serif; font-size:13px; border-radius:4px;">
    <input type="text" class="em-line-hsn" placeholder="HSN/SAC" value="${esc(it.hsnSac||'')}" style="flex:1 1 90px; min-width:80px; background:var(--bg); border:1px solid var(--border); color:var(--text); padding:9px 10px; font-family:'IBM Plex Mono',monospace; font-size:12.5px; border-radius:4px;">
    <input type="number" class="out-line-qty em-line-qty" step="any" min="0" placeholder="Qty" value="${esc(it.qty||'')}" oninput="editItemsRecalc()">
    <select class="em-line-uom" style="background:var(--bg); border:1px solid var(--border); color:var(--text); padding:9px 8px; font-family:'IBM Plex Sans',sans-serif; font-size:12.5px; border-radius:4px;">${SA_UOMS.map(u=>`<option value="${u}" ${it.uom===u?'selected':''}>${u}</option>`).join('')}</select>
    <input type="number" class="em-line-rate" step="0.01" min="0" placeholder="Rate" value="${esc(it.rate||'')}" oninput="editItemsRecalc()" style="flex:0 1 110px; min-width:90px; background:var(--bg); border:1px solid var(--border); color:var(--text); padding:9px 10px; font-family:'IBM Plex Mono',monospace; font-size:12.5px; border-radius:4px;">
    <input type="number" class="em-line-amount" step="0.01" placeholder="Amount" readonly tabindex="-1" value="${esc(it.amount||'')}" style="flex:0 1 120px; min-width:100px; background:var(--bg); border:1px solid var(--border); color:var(--muted); padding:9px 10px; font-family:'IBM Plex Mono',monospace; font-size:12.5px; border-radius:4px;">
    <button type="button" class="icon-btn out-line-remove" onclick="removeEditItemLine(this)" title="Remove this item">&#10005;</button>
  </div>`;
}
function addEditItemLine(){
  const wrap = document.getElementById('edit-item-lines');
  if(wrap){ wrap.insertAdjacentHTML('beforeend', editItemLineHtml()); editItemsRecalc(); }
}
function removeEditItemLine(btn){
  const wrap = document.getElementById('edit-item-lines');
  const line = btn.closest('.em-item-line');
  if(!wrap || !line) return;
  if(wrap.querySelectorAll('.em-item-line').length <= 1){
    line.querySelectorAll('input').forEach(el=>el.value='');
  } else {
    line.remove();
  }
  editItemsRecalc();
}
function readEditItemLines(){
  return [...document.querySelectorAll('#edit-item-lines .em-item-line')].map(line=>{
    const gv = sel => { const el = line.querySelector(sel); return el ? (el.value||'').trim() : ''; };
    const qty = parseFloat(gv('.em-line-qty'))||0;
    const rate = parseFloat(gv('.em-line-rate'))||0;
    const amount = Math.round(qty*rate*100)/100;
    return {description: gv('.em-line-desc'), hsnSac: gv('.em-line-hsn'), qty: gv('.em-line-qty'), uom: gv('.em-line-uom')||'Nos', rate: gv('.em-line-rate'), amount: amount ? String(amount) : ''};
  }).filter(it => it.description!=='' || it.qty!=='' || it.rate!=='');
}
/* Live totals inside the edit modal: per-line Amount, Taxable, GST and Total */
function editItemsRecalc(){
  const r2 = n => Math.round(n*100)/100;
  let taxable = 0;
  document.querySelectorAll('#edit-item-lines .em-item-line').forEach(line=>{
    const qty = parseFloat((line.querySelector('.em-line-qty')||{}).value)||0;
    const rate = parseFloat((line.querySelector('.em-line-rate')||{}).value)||0;
    const amt = r2(qty*rate);
    const amtEl = line.querySelector('.em-line-amount');
    if(amtEl) amtEl.value = amt ? amt.toFixed(2) : '';
    taxable += amt;
  });
  taxable = r2(taxable);
  const gv = id => { const el = document.getElementById(id); return el ? (parseFloat(el.value)||0) : 0; };
  const sv = (id, v) => { const el = document.getElementById(id); if(el) el.value = v; };
  sv('edit-f-taxable', taxable ? taxable.toFixed(2) : '');
  const gstBase = r2(taxable + gv('edit-f-freight'));
  [['edit-f-cgstPct','edit-f-cgst'],['edit-f-sgstPct','edit-f-sgst'],['edit-f-igstPct','edit-f-igst']].forEach(pair=>{
    const p = gv(pair[0]);
    if(p) sv(pair[1], gstBase ? r2(gstBase*p/100).toFixed(2) : '');
  });
  const total = r2(taxable + gv('edit-f-freight') + gv('edit-f-cgst') + gv('edit-f-sgst') + gv('edit-f-igst') + gv('edit-f-cess') + gv('edit-f-roundOff'));
  if(total) sv('edit-f-invoiceValue', total.toFixed(2));
}

function renderEditModal(record){
  const schema0 = EDIT_SCHEMAS[editModalState.table];
  const isSalesAcct = editModalState.table === 'salesAccounts';
  /* For sales entries the item details are edited line by line below,
     so the merged flat fields are hidden from the modal. */
  const itemKeys = ['description','hsnSac','qty','uom','rate'];
  const schema = isSalesAcct ? schema0.filter(f=>itemKeys.indexOf(f.key)===-1) : schema0;
  const itemsSection = isSalesAcct ? `
    <div class="out-lines-head" style="margin-top:14px;">Description of Goods &mdash; item lines</div>
    <div id="edit-item-lines">${(saItems(record).map(it=>editItemLineHtml(it)).join('')) || editItemLineHtml()}</div>
    <div style="margin:10px 0 4px 0;"><button type="button" class="btn btn-ghost" onclick="addEditItemLine()">+ Add another item</button></div>` : '';
  const fieldsHtml = schema.map(f=>{
    const val = record[f.key]==null ? '' : record[f.key];
    if(f.type==='select'){
      return `<div class="field"><label>${esc(f.label)}</label><select id="edit-f-${f.key}">
        ${f.options.map(o=>`<option value="${esc(o)}" ${val===o?'selected':''}>${o===''?'Select':esc(o)}</option>`).join('')}
      </select></div>`;
    }
    if(f.type==='image'){
      const hasImg = !!val;
      return `<div class="field">
        <label>${esc(f.label)}</label>
        <div style="display:flex; align-items:center; gap:12px;">
          <img id="edit-f-${f.key}-preview" src="${hasImg?esc(val):''}" alt="" style="width:56px; height:56px; border-radius:50%; object-fit:cover; background:var(--panel-2); border:1px solid var(--border); display:${hasImg?'block':'none'};">
          <input type="file" accept="image/*" onchange="handleEditImageChange(event,'${f.key}')">
        </div>
        <input type="hidden" id="edit-f-${f.key}" value="${esc(val)}">
      </div>`;
    }
    return `<div class="field"><label>${esc(f.label)}</label><input type="${f.type}" id="edit-f-${f.key}" value="${esc(val)}"></div>`;
  }).join('');

  const modalHtml = `
  <div id="edit-modal-root" class="modal-overlay">
    <div class="modal-card">
      <div class="modal-head"><h3>Edit Record</h3><button class="icon-btn" onclick="closeEditModal()">Close</button></div>
      <div class="modal-body"><div class="form-grid">${fieldsHtml}</div>${itemsSection}</div>
      <div class="modal-actions">
        <button class="btn btn-ghost" onclick="closeEditModal()">Cancel</button>
        <button class="btn" onclick="saveEditModal()">Save Changes</button>
      </div>
    </div>
  </div>`;
  document.body.insertAdjacentHTML('beforeend', modalHtml);
}

function handleEditImageChange(evt, key){
  const file = evt.target.files && evt.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = function(e){
    const dataUrl = e.target.result;
    const hidden = document.getElementById('edit-f-'+key);
    if(hidden) hidden.value = dataUrl;
    const preview = document.getElementById('edit-f-'+key+'-preview');
    if(preview){ preview.src = dataUrl; preview.style.display = 'block'; }
  };
  reader.readAsDataURL(file);
}

async function saveEditModal(){
  if(!editModalState) return;
  const {table, id} = editModalState;
  if(table === 'users' && !isAdmin()){ closeEditModal(); return; }
  if((table === 'purchaseAccounts' || table === 'salesAccounts') && !canSeeTab('accounts')){ closeEditModal(); return; }
  const schema = EDIT_SCHEMAS[table];
  const record = findEditRecord(table, id);
  if(!record){ closeEditModal(); return; }
  schema.forEach(f=>{
    const el = document.getElementById('edit-f-'+f.key);
    if(!el) return;
    let v = el.value;
    if(typeof v === 'string') v = v.trim();
    record[f.key] = v;
  });
  if(table==='outward'){
    const qty = parseFloat(record.qty)||0;
    const unitPrice = parseFloat(record.unitPrice)||0;
    record.totalPrice = (qty && unitPrice) ? (qty*unitPrice) : '';
  }
  if(table==='vendorPO' || table==='customerPO' || table==='sales'){
    const qty = parseFloat(record.qty)||0;
    const unitPrice = parseFloat(record.unitPrice)||0;
    record.totalValue = (qty && unitPrice) ? (qty*unitPrice) : '';
  }
  if(table==='salaries'){
    const b = parseFloat(record.basic)||0, a = parseFloat(record.allowances)||0, dd = parseFloat(record.deductions)||0;
    record.net = (b||a||dd) ? +(b + a - dd).toFixed(2) : '';
  }
  if(table==='leaves' && record.from && record.to){
    const days = Math.round((new Date(record.to) - new Date(record.from)) / 86400000) + 1;
    if(days > 0) record.days = days;
  }
  if(table==='enquiry' && !record.action) record.action = 'Pending';
  if(table==='salesAccounts'){
    /* Rebuild the record's items from the line editor and re-derive the
       flat fields that the register and documents rely on. */
    const items = readEditItemLines();
    record.items = items;
    const first = items[0] || {};
    record.description = items.map(it=>it.description).filter(Boolean).join('; ');
    record.hsnSac = [...new Set(items.map(it=>it.hsnSac).filter(Boolean))].join(', ');
    record.qty = String(items.reduce((a,it)=>a+(parseFloat(it.qty)||0),0) || '');
    record.uom = first.uom || '';
    record.rate = first.rate || '';
    const taxable = Math.round(items.reduce((a,it)=>a+(parseFloat(it.amount)||0),0)*100)/100;
    if(items.length){
      record.taxable = taxable ? String(taxable) : '';
      record.amount = record.taxable;
    }
  }
  if(table==='salesAccounts' && String(record.taxable||'').trim()!==''){
    const n = v => parseFloat(v)||0;
    /* If a GST % is chosen, re-derive the tax amount from the taxable value */
    [['cgstPct','cgst'],['sgstPct','sgst'],['igstPct','igst']].forEach(pair=>{
      const p = n(record[pair[0]]);
      if(p) record[pair[1]] = String(Math.round((n(record.taxable)+n(record.freight))*p)/100);
    });
    const total = Math.round((n(record.taxable)+n(record.freight)+n(record.cgst)+n(record.sgst)+n(record.igst)+n(record.cess)+n(record.roundOff))*100)/100;
    record.invoiceValue = total ? String(total) : record.invoiceValue;
    if(record.invoiceValue) record.valueInWords = numberToWordsINR(record.invoiceValue);
  }
  if(table==='salesAccounts'){
    record.balanceOutstanding = salesBalance(record);
  }
  if(table==='users'){
    await saveUsers();
  } else {
    await saveLocation(currentLocation);
  }
  closeEditModal();
  render();
}

function quoteTotals(q){

}

}
function numberToWordsINR(num){
  num = Math.round((parseFloat(num)||0)*100)/100;
  if(num===0) return 'Zero Rupees Only';
  const ones=['','One','Two','Three','Four','Five','Six','Seven','Eight','Nine','Ten','Eleven','Twelve','Thirteen','Fourteen','Fifteen','Sixteen','Seventeen','Eighteen','Nineteen'];
  const tens=['','','Twenty','Thirty','Forty','Fifty','Sixty','Seventy','Eighty','Ninety'];
  function two(n){ return n<20 ? ones[n] : (tens[Math.floor(n/10)] + (n%10?' '+ones[n%10]:'')); }
  function three(n){ return (n>99 ? ones[Math.floor(n/100)]+' Hundred'+(n%100?' ':'') : '') + (n%100?two(n%100):''); }
  let rupees = Math.floor(num);
  const paise = Math.round((num-rupees)*100);
  let out = '';
  const crore = Math.floor(rupees/10000000); rupees%=10000000;
  const lakh = Math.floor(rupees/100000); rupees%=100000;
  const thousand = Math.floor(rupees/1000); rupees%=1000;
  if(crore) out += three(crore)+' Crore ';
  if(lakh) out += three(lakh)+' Lakh ';
  if(thousand) out += three(thousand)+' Thousand ';
  if(rupees) out += three(rupees);
  out = (out.trim()||'Zero') + ' Rupees';
  if(paise) out += ' and ' + two(paise) + ' Paise';
  return out + ' Only';
}

async function saveQuotation(e){
  e.preventDefault();
  const d = DATA[currentLocation];
  if(!Array.isArray(d.quotations)) d.quotations = [];
  const q = readQuoteForm();
  if(q.items.length === 0){ alert('Fill at least one item.'); return false; }
  const t = quoteTotals(q);
  const rec = Object.assign({}, q, { totalQty: t.totalQty, totalPrice: t.totalPrice, addedBy: actorName() });
  let savedId;
  if(editingQuoteId){
    const idx = d.quotations.findIndex(x=>x.id===editingQuoteId);
    if(idx>=0){ rec.id = editingQuoteId; d.quotations[idx] = rec; savedId = editingQuoteId; }
    editingQuoteId = null;
  }
  if(!savedId){ rec.id = uid(); d.quotations.push(rec); savedId = rec.id; }
  await saveLocation(currentLocation);
  render();
  openQuotePreview(savedId);
  return false;
}

function exportQuotationExcel(id){
  const d = DATA[currentLocation];
  const q = (d.quotations||[]).find(x=>x.id===id);
  if(!q) return;
  if(typeof XLSX === 'undefined'){ alert('Excel export library failed to load. Check your connection.'); return; }
  const t = quoteTotals(q);
  const items = q.items||[];
  const cols = QUOTE_ITEM_GROUPS.flatMap(g=>g.cols);
  /* ----- Sheet R0, laid out exactly like the template ----- */
  const aoa = [];
  aoa.push([]); /* row1: logo space */
  aoa.push(['Customer', dash(q.customer), '', 'Quote #', dash(q.quoteNumber)]);
  aoa.push(['RFQ Type', dash(q.rfqType), '', 'Quote Date', dash(q.quoteDate)]);
  aoa.push(['RFQ Ref :', dash(q.rfqRef), '', 'Rev. No', dash(q.revNo||'R0')]);
  aoa.push(['RFQ Date', dash(q.rfqDate), '', 'Rev. Date', dash(q.revDate)]);
  aoa.push(['Kidn Attn : ', dash(q.kindAttn)]);
  aoa.push([]);
  /* row 8: group headers positioned at their starting columns */
  const groupRow = new Array(cols.length).fill('');
  let colIdx = 0;
  const merges = [];
  QUOTE_ITEM_GROUPS.forEach(g=>{
    groupRow[colIdx] = g.label;
    if(g.cols.length>1) merges.push({s:{r:7,c:colIdx}, e:{r:7,c:colIdx+g.cols.length-1}});
    colIdx += g.cols.length;
  });
  aoa.push(groupRow);
  aoa.push(cols.map(c=>c.label)); /* row 9 */
  items.forEach((it,i)=>{
    aoa.push(cols.map(c=>{
      if(c.key==='slNo') return i+1;
      if(c.key==='totalPrice'){ const v=(parseFloat(it.qty)||0)*(parseFloat(it.unitPrice)||0); return v||'-'; }
      if(c.num){ const v=parseFloat(it[c.key]); return isNaN(v)?dash(it[c.key]):v; }
      return dash(it[c.key]);
    }));
  });
  aoa.push([]);
  const nCols = cols.length;
  const totalRow = new Array(nCols).fill('');
  totalRow[nCols-3]='TOTAL'; totalRow[nCols-2]=t.totalQty; totalRow[nCols-1]=t.totalPrice;
  aoa.push(totalRow);
  if(accFilled(QUOTE_CV_ACC, q.accessoriesCV)){
    aoa.push([]);
    aoa.push(['Accessories/ Supply for Control Valve:']);
    QUOTE_CV_ACC.forEach(f=>{ const v=String((q.accessoriesCV||{})[f.key]||'').trim(); if(v) aoa.push([f.label, v]); });
  }
  if(accFilled(QUOTE_ONOFF_ACC, q.accessoriesOnOff)){
    aoa.push([]);
    aoa.push(['Accessories/ Supply for On/Off:']);
    QUOTE_ONOFF_ACC.forEach(f=>{ const v=String((q.accessoriesOnOff||{})[f.key]||'').trim(); if(v) aoa.push([f.label, v]); });
  }
  /* ----- Sheet T&C ----- */
  const tc = [[],['The terms and conditions of sale are:']];
  quoteTermsLines(q).forEach(l=>tc.push([l]));
  tc.push([]);
  tc.push(['We trust our offer is in line with your requirement. Should you feel any Techno/ Commercial clarifications are to be discussed, please do write / call us for the same.']);
  if(q.salesRegionPoc) tc.push(['Sales Region & POC: ' + q.salesRegionPoc]);
  tc.push([]); tc.push([]);
  tc.push(['BEST REGARDS,', '', '', 'For Techno-commercial queries']);
  tc.push([q.signName||'', '', '', q.techContactName||'']);
  tc.push(['', '', '', 'Ph.No. '+(q.techContactPhone||'')]);
  try{
    const ws = XLSX.utils.aoa_to_sheet(aoa);
    ws['!merges'] = merges;
    ws['!cols'] = cols.map(c=>({wch: Math.max(10, Math.min(22, c.label.length+2))}));
    const ws2 = XLSX.utils.aoa_to_sheet(tc);
    ws2['!cols'] = [{wch:110}];
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, dash(q.revNo||'R0').replace(/[^A-Za-z0-9]/g,'') || 'R0');
    XLSX.utils.book_append_sheet(wb, ws2, 'T&C');
    XLSX.writeFile(wb, (q.quoteNumber||'Quotation').replace(/[^a-z0-9_\-]+/gi,'_') + '.xlsx');
  }catch(err){ console.error('quote export failed', err); alert('Export failed: '+err.message); }
}

let CUSTOM_FIELDS = {}; /* {table: [{key,label,type,options[]}]} - stored globally with users doc */
const CF_TABLES = [
  ['vendorPO','Vendor P.O'],['customerPO','Customer P.O'],['inward','Inward'],['inventory','Inventory'],
  ['outward','Outward'],['logistics','Logistics'],['futureShipments','Future Shipments'],['sales','Sales'],['employees','HR - Employees'],['attendance','HR - Attendance'],['leaves','HR - Leave'],['salaries','HR - Salary'],
  ['automation','Automation'],['pendingAssembly','Pending Assembly'],['enquiry','Enquiry'],
  ['purchaseAccounts','Accounts - Purchase'],['salesAccounts','Accounts - Sales']
];
const CF_FORM_MAP = {addVendorPO:'vendorPO', addCustomerPO:'customerPO', addInward:'inward', addInventory:'inventory', addOutward:'outward', addLogistics:'logistics', addFutureShipment:'futureShipments', addSales:'sales', addEmployee:'employees', addAttendance:'attendance', addLeave:'leaves', addSalary:'salaries', addAutomation:'automation', addPendingAssembly:'pendingAssembly', addEnquiry:'enquiry', addPurchaseAccount:'purchaseAccounts', addSalesAccount:'salesAccounts'};
let EDIT_SCHEMAS_BASE_LEN = null;
function cfDefs(table){ return (CUSTOM_FIELDS && CUSTOM_FIELDS[table]) || []; }
function cfHeaders(table){ return cfDefs(table).map(f=>`<th>${esc(f.label)}</th>`).join(''); }
function cfCells(table, r){ return cfDefs(table).map(f=>`<td>${esc(r[f.key]==null?'':r[f.key])}</td>`).join(''); }
function cfExportAppend(table, records, headers, rows){
  const defs = cfDefs(table);
  if(!defs.length) return;
  defs.forEach(f=>headers.push(f.label));
  rows.forEach((row,i)=>{ defs.forEach(f=>row.push(records[i] ? (records[i][f.key]==null?'':records[i][f.key]) : '')); });
}
function syncCustomFieldSchemas(){
  if(!EDIT_SCHEMAS_BASE_LEN){
    EDIT_SCHEMAS_BASE_LEN = {};
    for(const t in EDIT_SCHEMAS) EDIT_SCHEMAS_BASE_LEN[t] = EDIT_SCHEMAS[t].length;
  }
  CF_TABLES.forEach(([t])=>{
    if(!EDIT_SCHEMAS[t]) return;
    EDIT_SCHEMAS[t].length = EDIT_SCHEMAS_BASE_LEN[t] != null ? EDIT_SCHEMAS_BASE_LEN[t] : EDIT_SCHEMAS[t].length;
    cfDefs(t).forEach(f=>{
      EDIT_SCHEMAS[t].push(f.type==='select'
        ? {key:f.key, label:f.label, type:'select', options:(f.options&&f.options.length?f.options:[''])}
        : {key:f.key, label:f.label, type:(f.type==='number'?'number':(f.type==='date'?'date':'text'))});
    });

function injectCustomFieldInputs(){
  try{
    document.querySelectorAll('#app form').forEach(form=>{
      const os = form.getAttribute('onsubmit')||'';
      const m = /return (\w+)\(/.exec(os);
      const table = m && CF_FORM_MAP[m[1]];
      if(!table) return;
      const defs = cfDefs(table);
      if(!defs.length || form.querySelector('.cf-block')) return;
      const block = document.createElement('div');
      block.className = 'cf-block';
      block.innerHTML = `<div class="access-title">Additional fields</div><div class="form-grid">` + defs.map(f=>{
        if(f.type==='select') return `<div class="field"><label>${esc(f.label)}</label><select class="cf-input" data-cf="${f.key}"><option value=""></option>${(f.options||[]).map(o=>`<option value="${esc(o)}">${esc(o)}</option>`).join('')}</select></div>`;
        const type = f.type==='number' ? 'number' : (f.type==='date' ? 'date' : 'text');
        return `<div class="field"><label>${esc(f.label)}</label><input type="${type}" ${type==='number'?'step="any"':''} class="cf-input" data-cf="${f.key}" placeholder="Optional"></div>`;
      }).join('') + `</div>`;
      const btn = form.querySelector('button[type="submit"]');
      if(btn) btn.parentNode.insertBefore(block, btn); else form.appendChild(block);
    });
  }catch(e){ console.error('cf inject failed', e); }
}
/* Capture custom-field values at submit time; applied to the new record(s) in saveLocation */
let cfPending = null;
document.addEventListener('submit', function(e){
  try{
    const form = e.target;
    if(!form || !form.getAttribute) return;
    const m = /return (\w+)\(/.exec(form.getAttribute('onsubmit')||'');
    const table = m && CF_FORM_MAP[m[1]];
    if(!table){ cfPending = null; return; }
    const values = {};
    form.querySelectorAll('.cf-input').forEach(el=>{
      const v = (el.value||'').trim();
      if(v!=='') values[el.dataset.cf] = v;
    });
    const d = DATA[currentLocation];
    cfPending = {table: table, values: values, prevLen: (d && Array.isArray(d[table])) ? d[table].length : 0};
  }catch(err){ cfPending = null; }
}, true);
function applyCfPending(loc){
  if(!cfPending) return;
  try{
    const d = DATA[loc];
    const arr = d && d[cfPending.table];
    if(Array.isArray(arr) && arr.length > cfPending.prevLen && Object.keys(cfPending.values).length){
      for(let i=cfPending.prevLen; i<arr.length; i++) Object.assign(arr[i], cfPending.values);
    }
  }catch(e){}
  cfPending = null;
}

async function toggleUserExtraTab(username, tabId){
  if(!isAdmin()) return;
  const u = USERS.find(x=>x.username===username);
  if(!u) return;
  if(LOCKED_TABS.includes(tabId)) return; /* Dashboard & Users stay as the role defines */
  if(username === session.username){
    alert('You cannot change your own access. Ask another admin to do it.');
    return;
  }
  if(!Array.isArray(u.extraTabs)) u.extraTabs = [];
  if(!Array.isArray(u.deniedTabs)) u.deniedTabs = [];
  const roleTabs = roleTabsFor(u.role);
  if(roleTabs.includes(tabId)){
    /* role tab: toggle removed / restored */
    if(u.deniedTabs.includes(tabId)){
      u.deniedTabs = u.deniedTabs.filter(t=>t!==tabId);
    } else {
      u.deniedTabs.push(tabId);
    }
  } else {
    /* non-role tab: toggle granted / not granted */
    if(u.extraTabs.includes(tabId)){
      u.extraTabs = u.extraTabs.filter(t=>t!==tabId);
    } else {
      u.extraTabs.push(tabId);
    }
  }
  await saveUsers();
  render();
}
function accessPanelRow(u){
  const roleTabs = roleTabsFor(u.role);
  const extras = Array.isArray(u.extraTabs) ? u.extraTabs : [];
  const denied = Array.isArray(u.deniedTabs) ? u.deniedTabs : [];
  const isSelf = u.username === session.username;
  const chips = TABS.filter(t => t.id !== 'users' || u.role === 'admin').map(t => {
    const label = esc(t.label);
    const click = (LOCKED_TABS.includes(t.id) || isSelf) ? '' : ` onclick="toggleUserExtraTab('${esc(u.username)}','${t.id}')"`;
    if(LOCKED_TABS.includes(t.id) && (roleTabs.includes(t.id))){
      return `<span class="access-chip chip-role" title="Fixed access">&#10003; ${label} <span class="chip-tag">fixed</span></span>`;
    }
    if(roleTabs.includes(t.id) && !denied.includes(t.id)){
      return `<span class="access-chip chip-role${click?' chip-clickable':''}"${click} title="From the ${esc(u.role)} role &mdash; click to remove">&#10003; ${label} <span class="chip-tag">role &#10005;</span></span>`;
    }
    if(roleTabs.includes(t.id) && denied.includes(t.id)){
      return `<span class="access-chip chip-denied${click?'':''}"${click} title="Role access removed by admin &mdash; click to restore">&#8856; ${label} <span class="chip-tag">removed</span></span>`;
    }
    if(extras.includes(t.id)){
      return `<span class="access-chip chip-extra"${click} title="Click to remove this access">&#10003; ${label} <span class="chip-tag">granted &#10005;</span></span>`;
    }
    return `<span class="access-chip chip-grant"${click} title="Click to grant access">+ ${label}</span>`;
  }).join('');
  const note = isSelf ? 'You cannot change your own access.' : 'Green = from role (click to remove), blue = extra granted (click to remove), red = removed (click to restore), dashed = click to grant.';
  return `<tr class="access-row"><td colspan="5">
    <div class="access-title">Tab access for ${esc(u.name)} (${esc(u.username)}) &mdash; ${note}</div>
    <div class="access-chips">${chips}</div>
  </td></tr>`;
}

function fmtAuditTime(ts){
  try{
    const d = new Date(ts);
    if(isNaN(d.getTime())) return esc(ts || '');
    const p = n => String(n).padStart(2, '0');
    return p(d.getDate()) + '-' + p(d.getMonth()+1) + '-' + d.getFullYear() + ' ' + p(d.getHours()) + ':' + p(d.getMinutes()) + ':' + p(d.getSeconds());
  }catch(e){ return esc(ts || ''); }
}
function auditActionBadge(action){
  const colors = { 'LOGIN':'#2e9e5b', 'LOGOUT':'#8a93a6', 'DATA CHANGE':'#3d8bef', 'USER ADMIN':'#e08a2e', 'NOTICE':'#8a5cd6', 'AUDIT':'#e6577a' };
  const bg = colors[action] || '#8a93a6';
  return `<span style="display:inline-block; background:${bg}; color:#fff; padding:2px 9px; border-radius:10px; font-size:10.5px; font-weight:600; letter-spacing:0.05em; white-space:nowrap;">${esc(action)}</span>`;
}
function filteredAuditEntries(){
  const list = (AUDIT && Array.isArray(AUDIT.list)) ? AUDIT.list.slice() : [];
  list.reverse(); /* newest first */
  const q = auditSearch.trim().toLowerCase();
  return list.filter(en => {
    if(auditFilterUser && en.user !== auditFilterUser) return false;
    if(auditFilterAction && en.action !== auditFilterAction) return false;
    if(q){
      const hay = ((en.user||'')+' '+(en.name||'')+' '+(en.action||'')+' '+(en.details||'')+' '+(en.location||'')).toLowerCase();
      if(hay.indexOf(q) === -1) return false;
    }
    return true;
  });
}
function auditLogPanel(){
  const entries = filteredAuditEntries();
  const total = (AUDIT && Array.isArray(AUDIT.list)) ? AUDIT.list.length : 0;
  const shown = entries.slice(0, 200);
  const userOptions = [...new Set(((AUDIT && AUDIT.list) || []).map(e => e.user).filter(Boolean))];
  const actionOptions = ['LOGIN','LOGOUT','DATA CHANGE','USER ADMIN','NOTICE','AUDIT'];
  return `
  ${secHead('&#128220;', 'Audit Log')}
  <div class="panel"><div class="panel-head"><h3>Audit Log <span style="font-weight:400; text-transform:none; letter-spacing:normal; color:var(--muted); font-size:11px;">(logins, logouts &amp; data changes &mdash; last ${AUDIT_MAX} events kept)</span></h3>
    <div class="panel-head-actions">
      <button type="button" class="export-btn" onclick="refreshAuditLog()">&#8635; Refresh</button>
      ${exportBtn('exportAuditLog')}
      <button type="button" class="export-btn" style="border-color:var(--danger); color:var(--danger);" onclick="clearAuditLog()">&#10005; Clear Log</button>
    </div></div>
  <div class="panel-body">
    <div style="display:flex; gap:10px; flex-wrap:wrap; align-items:flex-end; margin-bottom:12px;">
      <div class="field" style="min-width:150px; margin:0;"><label>User</label>
        <select onchange="setAuditFilter('user', this.value)">
          <option value="">All users</option>
          ${userOptions.map(u => `<option value="${esc(u)}" ${auditFilterUser===u?'selected':''}>${esc(u)}</option>`).join('')}
        </select>
      </div>
      <div class="field" style="min-width:150px; margin:0;"><label>Action</label>
        <select onchange="setAuditFilter('action', this.value)">
          <option value="">All actions</option>
          ${actionOptions.map(a => `<option value="${esc(a)}" ${auditFilterAction===a?'selected':''}>${esc(a)}</option>`).join('')}
        </select>
      </div>
      <div class="field" style="min-width:200px; flex:1; margin:0;"><label>Search</label>
        <input type="text" value="${esc(auditSearch)}" placeholder="Search details, user, location... (press Enter)" onchange="setAuditFilter('search', this.value)">
      </div>
    </div>
    <div style="color:var(--muted); font-size:11px; margin-bottom:8px;">Showing ${shown.length} of ${entries.length} matching entries (${total} total).</div>
    <div style="max-height:420px; overflow:auto;">
    <table><thead><tr><th style="white-space:nowrap;">Date &amp; Time</th><th>User</th><th>Role</th><th>Location</th><th>Action</th><th>Details</th></tr></thead><tbody>
    ${shown.length === 0 ? `<tr><td colspan="6" style="text-align:center; color:var(--muted); padding:18px;">No audit entries yet. Logins, logouts and data changes will appear here automatically.</td></tr>` : shown.map(en => `<tr>
      <td style="white-space:nowrap; font-family:'IBM Plex Mono',monospace; font-size:11.5px;">${fmtAuditTime(en.ts)}</td>
      <td style="font-family:'IBM Plex Sans',sans-serif;">${esc(en.name || en.user)}<div style="color:var(--muted); font-size:10.5px;">${esc(en.user)}</div></td>
      <td>${esc(en.role || '-')}</td>
      <td>${esc(en.location || '-')}</td>
      <td>${auditActionBadge(en.action)}</td>
      <td style="font-size:12px;">${esc(en.details || '')}</td>
    </tr>`).join('')}
    </tbody></table>
    </div>
  </div></div>`;
}
function setAuditFilter(kind, value){
  if(kind === 'user') auditFilterUser = value;
  else if(kind === 'action') auditFilterAction = value;
  else if(kind === 'search') auditSearch = value;
  render();
}
async function refreshAuditLog(){
  await loadAudit();
  render();
}
function exportAuditLog(){
  const headers = ['Date & Time','Username','Name','Role','Location','Action','Details'];
  const rows = filteredAuditEntries().map(en => [fmtAuditTime(en.ts), en.user||'', en.name||'', en.role||'', en.location||'', en.action||'', en.details||'']);
  exportToExcel('Audit_Log', headers, rows);
}
async function clearAuditLog(){
  if(!isAdmin()) return;
  if(!confirm('Clear the entire audit log? This cannot be undone.')) return;
  AUDIT = { list: [] };
  await fsSet('audit_log', AUDIT);
  logAudit('AUDIT', 'Audit log cleared by admin');
  render();
}
function exportUsers(){
  const headers = ['Name','Username','Role','Mobile Number','Date of Birth','Address'];
  const rows = USERS.map(u=>[u.name, u.username, u.role, u.mobile||'', u.dob||'', u.address||'']);
  exportToExcel('Users', headers, rows);
}
async function addUser(e){
  e.preventDefault();
  if(!isAdmin()) return false;
  const username = document.getElementById('u-username').value.trim();
  if(USERS.some(u=>u.username===username)){
    alert('That username already exists.');
    return false;
  }
  USERS.push({
    name: document.getElementById('u-name').value.trim(),
    username: username,
    password: document.getElementById('u-password').value,
    role: document.getElementById('u-role').value,
    extraTabs: [],
    deniedTabs: []
  });
  await saveUsers();
  render();
  return false;
}
async function deleteUser(username){
  if(!isAdmin()) return;
  sessionDeletedUsers.push(username);
  USERS = USERS.filter(u=>u.username!==username);
  await saveUsers();
  render();
}

/* Logging out on tab/browser close is now handled automatically by
   sessionStorage itself (see saveSessionLocal/clearSessionLocal/
   readSessionLocal above) - no unload event listener needed, and this
   avoids the previous bug where a plain page refresh was mistakenly
   treated the same as closing the tab. */

boot();
</script>
</body>
</html>
